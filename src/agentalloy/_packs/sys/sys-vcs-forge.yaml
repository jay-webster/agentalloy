raw_prose: |
  # VCS forge

  The git remote is the source of truth — read it, don't guess:

  - `github.com` → **GitHub**, CLI `gh` (`gh pr create`, `gh pr view`).
  - `gitlab.com` or self-hosted GitLab → **GitLab**, CLI `glab` (`glab mr create`,
    `glab mr view`).
  - Neither CLI available → push the branch and print the forge's "create
    PR/MR" URL.

  ## Conventions

  - Branch from the default branch; never commit straight to it.
  - Branch name `<type>/<task-slug>` (e.g. `feat/link-shortener`), matching the
    contract slug.
  - One PR/MR per SDD task; conventional-commit title; body carries ship's
    narrative — what / why / how-verified, with links to the spec, design, and QA
    docs.

  ## Customize

  This is the one place VCS conventions live. If your org standardizes a forge,
  branch scheme, or review process, set it here — the golden workflows say "open
  a PR with your forge" and get the concrete from this skill.

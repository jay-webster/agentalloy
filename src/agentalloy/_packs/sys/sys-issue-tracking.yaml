raw_prose: |
  # Issue tracking

  Default: the **forge's native issues** (GitHub Issues / GitLab Issues) — see
  the VCS-forge system skill for which forge this repo uses. Unless your org runs
  a dedicated tracker, that's the source of truth.

  ## Linking work to an issue

  - One SDD task ↔ one issue. Put the issue id in the contract `task_slug` where
    it fits (e.g. `eng-1234-link-shortener`) and in commit messages.
  - intake / spec: link the issue the work traces to, or open one if it's new.
  - ship: reference the issue in the PR, and move it to Done on merge.

  ## Customize

  If your org tracks work in a dedicated tool — Linear (`ENG-1234`), Jira
  (`PROJ-123`), etc. — set its name, id convention, and CLI here. The golden
  workflows say "link the issue in your tracker" and get the concrete from this
  skill.

skill_id: vitest-coverage-and-watch
canonical_name: Vitest — Coverage & Watch Mode
description: 'Run Vitest in watch mode for the dev loop and measure coverage with the v8 provider: configure reporters and thresholds that fail CI when coverage drops below a floor.'

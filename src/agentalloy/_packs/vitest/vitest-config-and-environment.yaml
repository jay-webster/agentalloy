skill_id: vitest-config-and-environment
canonical_name: Vitest — Config & Test Environment
description: 'Configure Vitest for a React + TS project: reuse the Vite pipeline, pick the jsdom environment, enable globals, and register setupFiles for jest-dom matchers.'

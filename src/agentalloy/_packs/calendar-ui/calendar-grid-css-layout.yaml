skill_id: calendar-grid-css-layout
canonical_name: Calendar — 7x6 CSS Grid Layout & Weekday Labels
description: 'Lay out a month calendar with CSS grid: a seven-column track, a fixed six-row body, a weekday header row, and accessible day cells using semantic markup and grid roles instead of a table.'
category: engineering

skill_id: calendar-month-navigation
canonical_name: Calendar — Previous/Next Month Navigation
description: 'Move between months with native Date and controlled React state: a {year, month} cursor, prev/next handlers that roll over year boundaries, jump-to-today, and rebuilding the grid on change.'
category: engineering
skill_class: domain

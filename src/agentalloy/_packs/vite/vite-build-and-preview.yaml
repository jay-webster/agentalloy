skill_id: vite-build-and-preview
canonical_name: Vite — Production Build, Preview & Code-Splitting
description: 'Produce and inspect the production bundle: vite build with Rollup, preview the output locally, and split code with dynamic import() and manualChunks for cacheable vendor chunks.'
category: engineering
skill_class: domain
domain_tags:
- vite
- build
- code-splitting
always_apply: false
phase_scope:
- build
category_scope:

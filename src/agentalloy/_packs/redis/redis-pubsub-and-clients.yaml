raw_prose: "# Redis Pub/Sub and Client Patterns\n\n## Overview\n\nRedis Pub/Sub provides fire-and-forget broadcast messaging — no persistence, no acknowledgments. For durable messaging use Streams. This skill covers Pub/Sub semantics plus the client-library patterns common across language SDKs.\n\nSourced from https://redis.io/docs/latest/develop/pubsub/ and https://redis.io/docs/latest/develop/clients/.\n\n## Redis Pub/sub\n\n```json metadata\n{\n  \"title\": \"Redis Pub/sub\",\n  \"description\": \"How to use pub/sub channels in Redis\",\n  \"categories\": [\"docs\",\"develop\",\"stack\",\"oss\",\"rs\",\"rc\",\"oss\",\"kubernetes\",\"clients\"],\n  \"tableOfContents\": {\"sections\":[{\"id\":\"delivery-semantics\",\"title\":\"Delivery semantics\"},{\"id\":\"format-of-pushed-messages\",\"title\":\"Format of pushed messages\"},{\"id\":\"database-scoping\",\"title\":\"Database \\u0026 Scoping\"},{\"id\":\"wire-protocol-example\",\"title\":\"Wire protocol example\"},{\"id\":\"pattern-matching-subscriptions\",\"title\":\"Pattern-matching subscriptions\"},{\"id\":\"messages-matching-both-a-pattern-and-a-channel-subscription\",\"title\":\"Messages matching both a pattern and a channel subscription\"},{\"id\":\"the-meaning-of-the-subscription-count-with-pattern-matching\",\"title\":\"The meaning of the subscription count with pattern matching\"},{\"id\":\"sharded-pubsub\",\"title\":\"Sharded Pub/Sub\"},{\"id\":\"programming-example\",\"title\":\"Programming example\"},{\"id\":\"client-library-implementation-hints\",\"title\":\"Client library implementation hints\"}]}\n\n,\n  \"codeExamples\": []\n}\n```\n\n[`SUBSCRIBE`](https://redis.io/docs/latest/commands/subscribe), [`UNSUBSCRIBE`](https://redis.io/docs/latest/commands/unsubscribe) and [`PUBLISH`](https://redis.io/docs/latest/commands/publish) implement the [Publish/Subscribe messaging paradigm](http://en.wikipedia.org/wiki/Publish/subscribe) where (citing Wikipedia) senders (publishers) are not programmed to send their messages to specific receivers (subscribers).\nRather, published messages are categorized into channels, without knowledge of what (if any) subscribers there may be.\nSubscribers express interest in one or more channels and only receive messages that are of interest, without knowledge of what (if any) publishers there are.\nThis decoupling of publishers and subscribers allows for greater scalability and a more dynamic network topology.\n\nFor instance, to subscribe to channels \"channel11\" and \"ch:00\" the client issues a [`SUBSCRIBE`](https://redis.io/docs/latest/commands/subscribe) providing the names of the channels:\n\n```bash\nSUBSCRIBE channel11 ch:00\n```\n\nMessages sent by other clients to these channels will be pushed by Redis to all the subscribed clients.\nSubscribers receive the messages in the order that the messages are published.\n\nA client subscribed to one or more channels shouldn't issue commands, although it can [`SUBSCRIBE`](https://redis.io/docs/latest/commands/subscribe) and [`UNSUBSCRIBE`](https://redis.io/docs/latest/commands/unsubscribe) to and from other channels.\nThe replies to subscription and unsubscribing operations are sent in the form of messages so that the client can just read a coherent stream of messages where the first element indicates the type of message.\nThe commands that are allowed in the context of a subscribed RESP2 client are:\n\n* [`PING`](https://redis.io/docs/latest/commands/ping)\n* [`PSUBSCRIBE`](https://redis.io/docs/latest/commands/psubscribe)\n* [`PUNSUBSCRIBE`](https://redis.io/docs/latest/commands/punsubscribe)\n* [`QUIT`](https://redis.io/docs/latest/commands/quit)\n* [`RESET`](https://redis.io/docs/latest/commands/reset)\n* [`SSUBSCRIBE`](https://redis.io/docs/latest/commands/ssubscribe)\n* [`SUBSCRIBE`](https://redis.io/docs/latest/commands/subscribe)\n* [`SUNSUBSCRIBE`](https://redis.io/docs/latest/commands/sunsubscribe)\n* [`UNSUBSCRIBE`](https://redis.io/docs/latest/commands/unsubscribe)\n\nHowever, if RESP3 is used (see [`HELLO`](https://redis.io/docs/latest/commands/hello)), a client can issue any commands while in the subscribed state.\n\nPlease note that when using `redis-cli`, in subscribed mode commands such as [`UNSUBSCRIBE`](https://redis.io/docs/latest/commands/unsubscribe) and [`PUNSUBSCRIBE`](https://redis.io/docs/latest/commands/punsubscribe) cannot be used because `redis-cli` will not accept any commands and can only quit the mode with `Ctrl-C`.\n\n## Delivery semantics\n\nRedis' Pub/Sub exhibits _at-most-once_ message delivery semantics.\nAs the name suggests, it means that a message will be delivered once if at all.\nOnce the message is sent by the Redis server, there's no chance of it being sent again.\nIf the subscriber is unable to handle the message (for example, due to an error or a network disconnect) the message is forever lost.\n\nIf your application requires stronger delivery guarantees, you may want to learn about [Redis Streams](https://redis.io/docs/latest/develop/data-types/streams).\nMessages in streams are persisted, and support both _at-most-once_ as well as _at-least-once_ delivery semantics.\n\n## Connect with Redis client API libraries\n\n```json metadata\n{\n  \"title\": \"Connect with Redis client API libraries\",\n  \"description\": \"Connect your application to a Redis database and try an example\",\n  \"categories\": [\"docs\",\"develop\",\"stack\",\"oss\",\"rs\",\"rc\",\"oss\",\"kubernetes\",\"clients\"],\n  \"tableOfContents\": {\"sections\":[{\"id\":\"community-supported-clients\",\"title\":\"Community-supported clients\"},{\"id\":\"requirements\",\"title\":\"Requirements\"},{\"children\":[{\"id\":\"python\",\"title\":\"Python\"},{\"id\":\"javascript\",\"title\":\"JavaScript\"},{\"id\":\"java\",\"title\":\"Java\"},{\"id\":\"c\",\"title\":\"C#\"},{\"id\":\"php\",\"title\":\"PHP\"},{\"id\":\"client-library-decision-tree\",\"title\":\"Client library decision tree\"}],\"id\":\"choose-a-client-library-for-your-language\",\"title\":\"Choose a client library for your language\"}]}\n\n,\n  \"codeExamples\": []\n}\n```\n\nUse the Redis client libraries to connect to Redis servers from\nyour own code. We document the following client libraries\nfor nine main languages:\n\n| Language | Client name | Docs | Supported |\n| :-- | :-- | :-- | :-- |\n| [Python](https://www.python.org/) | [`redis-py`](https://github.com/redis/redis-py) |[`redis-py` guide](https://redis.io/docs/latest/develop/clients/redis-py) | Yes |\n| [Python](https://www.python.org/) | [`RedisVL`](https://github.com/redis/redis-vl-python) |[RedisVL guide](https://redis.io/docs/latest/develop/ai/redisvl) | Yes \n| [C#/.NET](https://learn.microsoft.com/en-us/dotnet/csharp/) | [`StackExchange.Redis`](https://github.com/StackExchange/StackExchange.Redis) |[`StackExchange.Redis` guide](https://redis.io/docs/latest/develop/clients/dotnet) | Yes |\n| [C#/.NET](https://learn.microsoft.com/en-us/dotnet/csharp/) | [`NRedisStack`](https://github.com/redis/NRedisStack) |[`NRedisStack` guide](https://redis.io/docs/latest/develop/clients/dotnet/nredisstack) | Yes |\n| [JavaScript](https://nodejs.org/en) | [`node-redis`](https://github.com/redis/node-redis) | [`node-redis` guide](https://redis.io/docs/latest/develop/clients/nodejs) | Yes |\n| [JavaScript](https://nodejs.org/en) | [`ioredis`](https://github.com/redis/ioredis) | [`ioredis` guide](https://redis.io/docs/latest/develop/clients/ioredis) | Yes |\n| [Java](https://www.java.com/en/) | [`Jedis`](https://github.com/redis/jedis) | [`Jedis` guide](https://redis.io/docs/latest/develop/clients/jedis) |  Yes |\n| [Java](https://www.java.com/en/) | [`Lettuce`](https://github.com/redis/lettuce) | [`Lettuce` guide](https://redis.io/docs/latest/develop/clients/lettuce) | Yes |\n| [Go](https://go.dev/) | [`go-redis`](https://github.com/redis/go-redis) | [`go-redis` guide](https://redis.io/docs/latest/develop/clients/go) | Yes |\n| [PHP](https://www.php.net/)| [`Predis`](https://github.com/predis/predis) | [`Predis` guide](https://redis.io/docs/latest/develop/clients/php) | Best effort [*](#best-effort) |\n| [C](https://en.wikipedia.org/wiki/C_(programming_language)) | [`hiredis`](https://github.com/redis/hiredis) | [`hiredis` guide](https://redis.io/docs/latest/develop/clients/hiredis) | Yes |\n| [Rust](https://www.rust-lang.org/) | [`redis-rs`](https://github.com/redis-rs/redis-rs) | [`redis-rs` guide](https://redis.io/docs/latest/develop/clients/rust) | Best effort [*](#best-effort) |\n| [Ruby](https://www.ruby-lang.org/en/) | [`redis-rb`](https://github.com/redis/redis-rb) | [`redis-rb` guide](https://redis.io/docs/latest/develop/clients/ruby) | Yes |\n\n*<a name=\"best-effort\"></a>\nRedis does not provide official support for third-party client libraries.\nHowever, we contribute new features, offer guidance, and collaborate with the community\non a best-effort basis to help ensure these libraries remain reliable and up-to-date.\n\n\nWe also provide several higher-level\n[object mapping (OM)](https://redis.io/docs/latest/develop/clients/om-clients)\nlibraries for [Python](https://redis.io/docs/latest/integrate/redisom-for-python),\n[C#/.NET](https://redis.io/docs/latest/integrate/redisom-for-net),\n[Node.js](https://redis.io/docs/latest/integrate/redisom-for-node-js), and\n[Java/Spring](https://redis.io/docs/latest/integrate/redisom-for-java).\n\n## Community-supported clients\n\nThe table below shows some popular third-party client libraries. Note that Redis does not\ndevelop or contribute to these libraries directly.\n\n| Language | Client name | Github | Docs |\n| :-- | :-- | :-- | :-- |\n| [C++](https://en.wikipedia.org/wiki/C%2B%2B) | Boost.Redis | https://github.com/boostorg/redis | https://www.boost.org/doc/libs/develop/libs/redis/doc/html/index.html |\n| [Dart](https://dart.dev/) | redis_dart_link | https://github.com/toolsetlink/redis_dart_link | https://github.com/toolsetlink/redis_dart_link |\n| [PHP](https://www.php.net/) | PhpRedis extension | https://github.com/phpredis/phpredis | https://github.com/phpredis/phpredis/blob/develop/README.md |\n| [Python](https://www.python.org/) | coredis | https://github.com/alisaifee/coredis | https://coredis.readthedocs.io |\n\n## Requirements\n\nYou will need access to a Redis server to use these libraries.\nYou can experiment with a local installation of Redis Open Source\n(see [Install Redis Open Source](https://redis.io/docs/latest/operate/oss_and_stack/install/install-stack/)) or with a free trial of [Redis Cloud](https://redis.io/docs/latest/operate/rc).\nTo interact with a Redis server without writing code, use the\n[Redis CLI](https://redis.io/docs/latest/develop/tools/cli) and\n[Redis Insight](https://redis.io/docs/latest/develop/tools/insight) tools.\n"

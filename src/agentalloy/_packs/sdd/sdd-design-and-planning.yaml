skill_id: sdd-design-and-planning
canonical_name: SDD — Design and Planning (sdd-design)
description: "Turn the spec into a technical design, an ordered task plan, and the unit test cases that prove it — written to a docs/design/<slug>/ folder (approach.md + tasks.md + test-plan.md, plus component files as the work needs) that build executes test-first."
category: operational
skill_class: workflow
domain_tags:
  - spec-driven-development
  - design
  - planning
  - task-breakdown
  - architecture
requires: []
always_apply: false
applies_to_phases:
  - design
# Load-bearing command tokens not derivable from exit_gates: how the agent works
# the build contracts and advances. A customization may reword the prose but must
# keep these verbatim.
prose_invariants:
  - "agentalloy phase set build"
  - "agentalloy task next"
exit_gates:
  all_of:
    - artifact_exists:
        path: docs/design/**/approach.md
    - artifact_contains:
        path: docs/design/**/approach.md
        sections:
          - Approach
    - artifact_exists:
        path: docs/design/**/tasks.md
    - artifact_contains:
        path: docs/design/**/tasks.md
        sections:
          - Tasks
    - artifact_exists:
        path: docs/design/**/test-plan.md
    - artifact_contains:
        path: docs/design/**/test-plan.md
        sections:
          - Test Cases
    # §6 hand-off: design must emit at least one build contract before build can
    # walk them with `task next`. Without this floor, `phase set build` passes with
    # zero contracts and build has no worklist (the gap that motivated this gate).
    - artifact_exists:
        path: .agentalloy/contracts/build/*.md
    # §6 density floor (#12): ONE build contract PER TASK, not one whole-feature
    # contract. Counts top-level items under `## Tasks` in the cursor'd item's
    # tasks.md and requires at least that many of THAT item's build contracts.
    # Cursor-scoped (#378): `{slug}` resolves to the active design work-item, and
    # contracts are attributed by their `work_item:` frontmatter — so a
    # fully-decomposed item advances regardless of sibling items still mid-design.
    # Floor-clamps to 1; UNKNOWN (fail-open) when no single work-item resolves.
    - build_contracts_cover_tasks:
        tasks: docs/design/{slug}/tasks.md
        contracts: .agentalloy/contracts/build/*.md
    # Tag-focus hard gate (#12b): each build contract must center ONE dominant tech
    # surface — ≤2 domain_tags. At the build retrieval cap a 7-surface basket
    # starves most surfaces. NOT_MET names the offender + its tag count; --force
    # bypasses it (no separate pre-check — the normal forward-gate carve-out).
    # Cursor-scoped (#378): only the active item's own build contracts are judged.
    - build_contract_tag_focus:
        contracts: .agentalloy/contracts/build/*.md
    # Human-in-the-loop checkpoint (#10): design→build requires a recorded approval.
    # `since` = the design docs (NOT the build contracts) so editing a contract
    # during build doesn't re-stale the approval. --force never bypasses this.
    - approval_recorded:
        since: docs/design/**/*.md
signal_keywords:
  - done with design
  - ready to build
  - next phase
contract_template: |
  ---
  phase: design
  task_slug: {{task_slug}}
  route: full
  domain_tags: []
  scope:
    touches: []
    avoids: []
  success_criteria: []
  related_contracts: []
  created_at: {{created_at}}
  ---

  # {{task_slug}}

  ## Scope in a sentence

  <what this changes, and the boundary of "this">

  ## Design

  Approach, task plan, and test cases live in docs/design/{{task_slug}}/
  (approach.md, tasks.md, test-plan.md).
# Workflow skills are selected by applies_to_phases (signal layer), not by
# phase_scope, so this is left empty and scoped via category instead.
phase_scope: []
category_scope: [process]
author: navistone
change_summary: "cursor-scope the design→build density + tag-focus gates to the active work-item (#378): `init` stamps build contracts with `work_item:` from the design cursor so a fully-decomposed item advances regardless of sibling items still mid-design; two-tier injection hand-off: design emits one build contract per task (§6) with the task's technology domain_tags + a self-contained task body that becomes build's retrieval prompt — so build walks them with `task next` and the matching skills front-load automatically; keeps the read-only approach→slices→test-cases design fanned into the per-slug docs/design folder gated on all three load-bearing files"
raw_prose: |
  # SDD — Design

  **Checkpoint first.** You MUST confirm `docs/spec/<slug>.md` exists and carries its
  **Acceptance Criteria** before designing — if it does not, you skipped spec; STOP and write it.
  You MUST NOT write any `src/` code in this phase: design produces documents only
  (`docs/design/<slug>/{approach,tasks,test-plan}.md`). If you are editing source, you are in the
  wrong phase.

  Spec settled *what* and *done*. Design settles *how* — the approach, the
  decisions you're committing to, and an ordered plan build can execute without
  re-deciding anything. Skipping straight to code is the classic SDD failure:
  you thrash on architecture you should have chosen on paper. Stay read-only
  here — design produces a document, not a diff.

  ## 1. Start from the spec

  Read `docs/spec/<slug>.md` and your work-item contract
  (`.agentalloy/contracts/design/<slug>.md`, which spec authored — the proxy
  already front-loaded its design skills on entry); acceptance and non-goals are
  fixed, you don't reopen them. Then read the code you'll touch: existing
  patterns, conventions, the seams you'll extend. Design fits the codebase you
  have, not the one you'd draw fresh.

  ## 2. Decide the approach — and say why

  Write the *how*: the structure, the key choices, and the rationale for each.
  The rationale is the point — "Postgres over SQLite because we need concurrent
  writers" is a decision build can trust; "use Postgres" is an order it can't
  evaluate. Name the alternatives you rejected when the call was close.

  ## 3. Slice it vertically, in dependency order

  Decompose into thin slices that each deliver a working, testable path — schema
  + API + UI for one capability — not horizontal layers (all schema, then all
  API). Order so foundations come first and every slice leaves the system green.
  Each task names the spec acceptance it satisfies; don't invent new acceptance
  here — that's spec's job.

  A slice may span schema + API + UI, but each *task* inside it should resolve to
  ONE dominant tech surface — don't basket many surfaces into a single task. §6
  turns each task into a build contract whose `domain_tags` must stay narrow, so
  decompose now with that in mind.

  Keep tasks small: one focused session each. If you're writing "and" in a task
  title, it's two tasks.

  ## 4. Design the unit test cases

  This is yours, not build's: with the whole design in front of you and no code
  to bias you, decide what proves each task correct. Write the cases as
  *behaviors* — input/condition, expected result, and the spec acceptance
  (AC-N) each one closes — covering the happy path, the boundaries, and the
  failure modes you can foresee. Build turns these into real tests and adds the
  edges it uncovers; you specify the cases, not the test code. Designing the
  test is where you catch a design that can't actually be verified — better here
  than mid-build.

  ## 5. Write it + hand off

  Design fans out into a per-slug folder build reads from — three load-bearing
  files, with the exact section headers the gate checks:

      docs/design/<task-slug>/approach.md    # the how + decisions, under `## Approach`
      docs/design/<task-slug>/tasks.md       # the ordered worklist, under `## Tasks`
      docs/design/<task-slug>/test-plan.md   # the unit cases, under `## Test Cases`

  Add more files as the work needs them — a data model, an interface contract, a
  subsystem's design — one file per concern, in the same folder. Don't cram a
  large design into one file; don't split a small one for the sake of it.

  ## 6. Emit one build contract per task

  **MUST: emit ONE build contract per task — never one whole-feature contract.**
  Build retrieval is budgeted to a small ~4-skill cap per contract (the `build`
  default in `DEFAULT_K_BY_PHASE`). A single contract that carries every task's
  tags spreads that budget across all of them, so most surfaces get **zero**
  skills — a 7-tag contract at k≈4 front-loads two surfaces and starves five. One
  contract per task, centered on one surface, keeps the budget on target. Design
  is the cheap place to do it, with the whole plan in front of you:

      agentalloy contract init --phase build --slug <NN-task-slug>   # NN = 01, 02, … sets order

  `init` stamps each build contract with `work_item:` (this design item's slug,
  from the active design cursor) so the density and tag-focus gates judge *your*
  item alone — sibling items still mid-design never block yours, and vice versa.

  In each, fill `domain_tags` with that task's *technology surface* — **one
  dominant surface plus at most one adjacent**, so **MUST: ≤2 `domain_tags` per
  contract** (`[react]`, `[fastapi, async]`, `[typescript, pure-functions]`),
  **not** a union of every surface in the feature and **not** process words
  (`build`, `coding`). Narrow tags are the whole point: with the fixed
  per-contract k≈4 and the token budget, same-surface candidates let the reranker
  separate cleanly and the right fragments reach the agent; pile on 5–7 surfaces
  and the important fragments truncate and the scores muddy.

  **MUST: tag the most *specific* surface the task implements, not the generic
  framework it happens to use.** A task that builds a feature behavior with its own
  domain (calendar navigation, date math, a charting axis) MUST carry that feature
  tag (`[calendar]`), **not** the framework it's written in (`[react]`). A framework
  tag retrieves framework boilerplate and starves the feature's domain skill — a
  navigation task mistagged `[react]` is exactly why month-navigation guidance never
  reached build even though the skill existed. When unsure, name the surface the
  *acceptance criteria* are about, not the language.

  Then write the
  `## Task` body as a self-contained description of what to implement. That body
  becomes build's retrieval prompt: the proxy composes the skills matching it and
  front-loads them with the task, so build never has to decide what it needs. Set
  `scope.touches/avoids` and name the `## Test cases` (the test-plan.md cases by
  AC-N). The contracts sort by their `NN-` prefix — that's build's worklist order.

  Anti-pattern (a real calendar build that starved): one contract tagged
  `[frontend, react, typescript, vite, calendar, css-grid, vitest]` — 7 surfaces,
  so at k≈4 the reranker never sees same-surface candidates and most fragments
  truncate. Pattern: split it into per-surface tasks, each ≤2 tags — the date
  layer `[calendar]`, the scaffold `[vite, react]`, the components
  `[react, css-grid]`, the tests `[vitest]`. Four focused contracts, four clean
  retrievals.

  Then **verify the hand-off is complete**, PRESENT it, and STOP — do not
  advance yourself. Each task is a top-level list item under `## Tasks`; the design→build
  gate counts those items and refuses the jump until at least that many build
  contracts exist under `.agentalloy/contracts/build/`, each carrying ≤2
  `domain_tags`. The forward jump is a human checkpoint: present the design and the
  per-task contracts in full, and only once the user explicitly approves do you
  record it with `agentalloy approve design` (it advances you into build) — or,
  after approval, advance with `agentalloy phase set build` and work the contracts
  top to bottom with `agentalloy task next`. If the design still has an open
  question — an approach you haven't committed to, a slice you can't yet test —
  **stop and surface it** instead of presenting it as done. The phase guard refuses
  the jump until `approach.md`, `tasks.md`, and `test-plan.md` all exist with their
  required sections, one build contract per task exists under
  `.agentalloy/contracts/build/` with ≤2 tags each, AND a human approval is
  recorded — so a premature `phase set` just names what's missing, including a
  forgotten contract or an over-tagged one.

  ## Not this

  Don't write code — design is read-only; the moment you're editing `src/`
  you've skipped to build. Don't re-litigate the spec's scope or acceptance; if
  design reveals the spec was wrong, fix it there (`agentalloy phase set spec`),
  don't quietly redefine it. Don't gold-plate the plan with sizing tables and
  risk matrices the work doesn't need — the approach, the ordered slices, and
  the test cases that prove them are the whole deliverable. And designing test
  cases means writing *behaviors*, not test files — the red tests are build's.
  And don't collapse the worklist into one all-tech contract — a single
  `[react, typescript, fastapi, duckdb, …]` body for the whole feature is the
  anti-pattern this phase exists to prevent: at k≈4 it front-loads two surfaces
  and starves the rest. One single-surface contract per task, ≤2 tags, always.

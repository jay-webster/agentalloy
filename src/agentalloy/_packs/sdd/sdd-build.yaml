author: navistone
change_summary: "rewrite as a tight, contract-driven build executing strict TDD (red → green → refactor) against the design's test-plan.md, work the tasks top to bottom, scope-honest; drop the overview filler, the standalone PostToolUse section (folded to one line), and the runtime-injected eval block"
raw_prose: |
  # SDD — Build

  Spec said *what*, design said *how* and *in what order*. Build is execution:
  work the design's task slices, one at a time, each proven by a test before you
  move on. No new decisions here — if you're inventing architecture or
  acceptance, you're in the wrong phase.

  ## 1. Load the plan

  Read `docs/design/<slug>/tasks.md` (your worklist), `test-plan.md` (the unit
  cases each task must pass), and `approach.md` (the how + decisions you're
  implementing against), plus `docs/spec/<slug>.md` (the acceptance behind it
  all). Take the tasks in order; pull in the folder's component files as the
  task you're on references them.

  ## 2. Open a build contract

      agentalloy contract init --phase build --slug <task-slug>

  Fill `domain_tags` and `scope.touches/avoids`. Writing it triggers the hook to
  inject the domain skills matching your tags on the next turn — the help
  arrives automatically. (If it doesn't: `agentalloy compose --contract
  .agentalloy/contracts/build/<slug>.md`.)

  ## 3. TDD: red → green → refactor, one case at a time

  Design already decided what proves each task — work its test cases from
  `test-plan.md`, don't re-derive them. For the task you're on, take each case:

  1. **Red** — write it as a test and run it (the **CI** system skill names the
     runner); watch it fail for the right reason.
  2. **Green** — write the minimum code to pass. No more than the case asks for.
  3. **Refactor** — clean it up with the test holding you safe.

  Add cases the implementation reveals — the test plan is the floor, not the
  ceiling — but every planned case ends up a real, passing test. One concern per
  commit; the whole suite green at every step.

  ## 4. Stay inside the scope you declared

  Work within the contract's `scope.touches`. Spreading wider than you planned is
  the signal to stop and check: is this scope creep (cut it), or did design miss
  something (fix it there — `agentalloy phase set design`)? Don't quietly grow
  the blast radius.

  ## 5. Done when

  Every case in `test-plan.md` is a passing test (plus the edges you added), the
  full suite is green with no regressions, and the work lives under `src/` with
  tests under `tests/`.

  Then advance yourself — don't wait to be told. With the suite green, run
  `agentalloy phase set qa` and carry on into review. If anything's unresolved —
  a case you couldn't make pass, a regression you can't explain — **stop and
  surface it** instead of advancing; a red suite isn't done. The phase guard
  refuses the jump until code exists under `src/` and tests under `tests/`, so a
  premature `phase set` just tells you what's missing.

  ## Not this

  Don't skip the test because the code "obviously works" — the test is the
  acceptance, made executable. Don't gold-plate beyond the spec, and don't fold
  in unrelated fixes you spot along the way (note them, leave them). If the
  design turns out wrong mid-build, don't freelance a new one — bail to `design`
  and re-plan.

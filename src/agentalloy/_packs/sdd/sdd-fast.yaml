skill_id: sdd-fast
canonical_name: SDD — Fast Lane (sdd-fast)
description: "One compressed spec+design+build pass for a single, clearly-bounded task intake routed to the fast lane, then merge into the standard qa → ship: keep the rigor, drop the ceremony, and bail to full SDD (spec) if it turns out harder than judged."
category: operational
skill_class: workflow
domain_tags:
  - spec-driven-development
  - fast-lane
  - small-change
  - single-pr
requires: []
always_apply: false
applies_to_phases:
  - sdd-fast
# Load-bearing command token not derivable from exit_gates: the fast-lane advance
# to qa. A customization may reword the prose but must keep it verbatim.
prose_invariants:
  - "agentalloy phase set qa"
exit_gates:
  all_of:
    - artifact_exists:
        path: docs/fast/*.md
    - artifact_contains:
        path: docs/fast/*.md
        sections:
          - Acceptance Criteria
          - Approach
          - Test Cases
    # Human-in-the-loop checkpoint (#10, D8): sdd-fast→qa approval is INERT
    # by default (`SDD_FAST_REQUIRE_APPROVAL=off`). When the flag is on, the
    # `approval_recorded` predicate gates the transition; `agentalloy approve
    # sdd-fast` writes the marker. CLI enforcement
    # (`phase.py::_approval_gate_blocks`) honors the flag too; this exit_gate
    # node surfaces the composed advisory in-proxy under the same flag.
    - approval_recorded:
        since: docs/fast/*.md
    - artifact_exists:
        path: "src/**"
    # Stack-aware: pytest, or JS/TS (Vitest/Jest) when package.json is present.
    # Packs may extend via `extra_globs`. Replaces the old hardcoded tests/**/*.py.
    - tests_present: {}
signal_keywords:
  - tests pass
  - ready to ship
  - ready for review
  - done
  - next phase
contract_template: |
  ---
  phase: sdd-fast
  task_slug: {{task_slug}}
  route: fast
  domain_tags: []
  scope:
    touches: []
    avoids: []
  success_criteria: []
  related_contracts: []
  created_at: {{created_at}}
  ---

  # {{task_slug_title}}

  ## The change

  <what changes, in a sentence or two>

  ## Done when

  <the obvious acceptance — and the tests that prove it>
phase_scope: []
category_scope: [process]
author: navistone
change_summary: fast-lane workflow — compressed spec+design+build for a single task (no build loop), merging into the standard qa → ship; bail-to-spec escape hatch
raw_prose: |
  # SDD — Fast Lane (sdd-fast)

  **Checkpoint first.** The fast lane compresses spec + design + build into one pass, but you MUST
  still write `docs/fast/<slug>.md` (**Acceptance Criteria**, **Approach**, **Test Cases**) before
  coding, and you MUST prove the work with tests under `tests/` before ship. You MUST NOT skip the
  acceptance and test cases just because the lane is fast — fast is not unspecified.

  You're on the fast lane: one compressed pass — spec → design → build → test —
  for a single, clearly-bounded task. It's the full lifecycle's spec + design +
  build collapsed into one pass (no build loop — one task, done once), then it
  merges into the **standard** `qa → ship`. Keep the rigor; drop the ceremony.

  ## One pass

  Capture the compressed spec + design in a single brief at `docs/fast/<slug>.md`
  with three headings — `## Acceptance Criteria`, `## Approach`, `## Test Cases` —
  the same load-bearing sections the full lane spreads across spec and design,
  just collapsed. Then build against it.

  1. **Acceptance Criteria.** State crisply what "done" means. If you can't, that's
     the signal you're on the wrong lane — bail.
  2. **Approach.** The single shape of the change in a few lines. If it needs real
     multi-step design or a task breakdown, bail.
  3. **Build.** Make the one change, staying inside the contract's
     `scope.touches`. No build loop — if it fragments into multiple tasks or
     spreads wider than scoped, bail.
  4. **Test Cases.** Write the tests that prove the acceptance, and run them green.
  5. **Hand to QA.** Once `docs/fast/<slug>.md` carries the three sections, code
     exists under `src/`, and a test under `tests/`, advance yourself —
     `agentalloy phase set qa` — into the **standard** verification + ship. Don't
     wait to be told. The phase guard refuses the jump until those exist, so a
     premature `phase set` just tells you what's still missing.

  Fast does *not* shortcut QA or ship: a small change still needs real
  verification. From `qa` on, you're on the same gates as the full lane.

  ## Bail to full SDD

  The fast lane is a bet that this is one simple task. If it turns out to need real
  design, touches more than you scoped, fragments into multiple tasks, or the
  acceptance got fuzzy, **stop and bail**:

      agentalloy phase set spec

  That drops you into the full lifecycle (`spec → design → build → qa → ship`)
  with the same contract. Bailing early is far cheaper than forcing a complex
  change through a one-pass lane.

  ## Not this

  Don't expand scope, gold-plate, or turn this into the full process by stealth.
  If it needs the full process, bail to `spec` — don't fake-fast it.

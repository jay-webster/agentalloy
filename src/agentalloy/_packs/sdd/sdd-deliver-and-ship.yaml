raw_prose: |
  # SDD — Ship (Deliver)

  QA signed off: the bar is green and the review is clean. Ship delivers that
  verified change — a pull request a human can review and trust, a record of
  what shipped, and a way back if it goes wrong. You're packaging work that's
  already proven, not re-proving it. This is the terminal phase.

  ## 1. Confirm you're shipping the verified state

  Read your work-item contract (`.agentalloy/contracts/ship/<slug>.md`, which qa
  authored — the proxy front-loaded the delivery skills for it on entry). Ship
  rides on QA's report (`docs/qa/<slug>.md`) — don't re-run the review. Just
  confirm the commit you're shipping *is* the reviewed one: the suite is green at
  HEAD and nothing landed after sign-off. If code changed since QA, it isn't
  verified — back to `qa`.

  ## 2. Write the PR narrative

  Open the PR with this repo's forge — the **VCS-forge** system skill names the
  CLI (`gh` / `glab`) and the branch/PR conventions. The description is the
  deliverable, not an afterthought:

  - **what** changed, in a sentence — the user-visible effect, not the file list.
  - **why** — the problem it solves; link the spec.
  - **how it was verified** — link the spec acceptance, the design, and the QA
    report so a reviewer can trace the chain instead of reconstructing it.

  A reviewer should be able to approve from the narrative plus the diff, without
  spelunking the history.

  ## 3. Record the delivery

  Write `docs/ship/<slug>.md` with `## Summary` (what shipped, the PR link, the
  release-notes or changelog entry) and `## Rollback` (how to reverse this exact
  change — the revert commit, the flag to flip, any data migration to undo). The
  PR is external and ephemeral; this record persists in the repo. Update the
  changelog or release notes to the repo's own convention.

  ## 4. Reversibility scales with risk

  How this org ships and rolls back is the **deploy-target** system skill's call
  — read it. Its default is merge-is-release, reversible with a revert, and
  that's enough for most changes. When the change carries real production risk —
  a migration, a user-facing behavior change, anything hard to undo — follow the
  deploy skill's rollout (flag / staged %) and watch the health signals it names,
  rolling back the moment one trips. Don't build that apparatus for a change a
  plain revert already covers.

  ## 5. After it lands

  Confirm the merge is healthy: the change is live, no new errors, the critical
  path still works. If something's wrong, it's the same loop as everywhere —
  route by cause (`agentalloy phase set build` for a defect, which earns a
  regression test on the way back through), don't hotfix blind.

  ## 6. Close it out

  Ship is terminal — unlike every other phase, it does **not** self-advance.
  Once the delivery record is written and the merge is healthy, the work is
  done: **stay in `ship`** and tell the user it shipped. The one transition out
  is back to the top, and it's the user's call, not yours — when they confirm
  they're finished (or kick off something new), reset the lifecycle with
  `agentalloy phase set intake` so the next session opens fresh. Never reset on
  your own initiative; wait for their go-ahead.

  ## Not this

  Don't re-do QA's work — ship trusts the gate; reverifying everything is just
  churn. Don't ship a narrative-free PR ("updates", "fixes") — the *why* is the
  point. Don't ship without a way back; "we'll figure out rollback if we need
  it" is how incidents start. And don't gold-plate delivery — a feature flag and
  a staged rollout for a one-line copy fix is its own kind of waste.

skill_id: sdd-verify-and-review
canonical_name: SDD — Verify and Review (sdd-verify)
description: "The wide net before ship: run the full suite (integration included), lint, and typecheck; verify the change meets every spec acceptance and respects non-goals; review for correctness/security/readability/architecture/performance — recorded to docs/qa/<slug>.md."
category: operational
skill_class: workflow
domain_tags:
  - code-review
  - quality-gates
  - verification
  - security
  - regression
requires: []
always_apply: false
applies_to_phases:
  - qa
# Load-bearing tokens not derivable from a gate path. (1) The forward advance to
# ship. (2) docs/solutions/ — the codify target: the lessons_recorded gate below
# resolves the slug internally and carries no `path` arg (so it emits no spurious
# advisory), which means the token is NOT auto-derived; asserting it here keeps
# prose and gate in lock-step, so a prose override that drops the "write the
# lesson" instruction is rejected at runtime (shipped prose served, warning
# logged) until its author re-adds the token. A customization may reword the
# prose but must keep both verbatim.
prose_invariants:
  - "agentalloy phase set ship"
  - "docs/solutions/"
exit_gates:
  all_of:
    - artifact_exists:
        path: docs/qa/*.md
    - artifact_contains:
        path: docs/qa/*.md
        sections:
          - Checks
          - Review
    # Compound-engineering codify gate: blocks qa->ship until THIS task's lesson
    # is recorded at docs/solutions/<slug>.md. Slug-scoped (eval_lessons_recorded
    # resolves the active work-item), so a stale docs/solutions/ file from a prior
    # task cannot satisfy it; deterministic, so it blocks under the CLI's
    # lm_client=None forward gate. `phase: qa` pins the work-item to resolve.
    - lessons_recorded:
        phase: qa
signal_keywords:
  - done with qa
  - review clean
  - ready to ship
  - next phase
contract_template: |
  ---
  phase: qa
  task_slug: {{task_slug}}
  route: full
  domain_tags: []
  scope:
    touches: []
    avoids: []
  success_criteria: []
  related_contracts: []
  created_at: {{created_at}}
  ---

  # {{task_slug}}

  ## QA scope

  <what needs verification — the change under review>

  ## Report

  Checks + review verdict live in docs/qa/{{task_slug}}.md.
# Workflow skills are selected by applies_to_phases (signal layer), not by
# phase_scope, so this is left empty and scoped via category instead.
phase_scope: []
category_scope: [process]
author: navistone
change_summary: "two-tier cascade: qa reads its incoming work-item from contracts/qa/ (build authored) and, on a clean report, seeds ship's work-item in contracts/ship/ with the delivery-surface domain_tags + a reversibility-minded body that becomes ship's retrieval prompt; keeps the full quality bar → spec/non-goals/drift → severity-labelled review (docs/qa/<slug>.md) and route-by-cause remediation. Adds the compound-engineering codify gate: a slug-scoped lessons_recorded exit-gate leaf blocks qa→ship until docs/solutions/<slug>.md records this task's lesson (a stale prior-task lesson can't satisfy it), with docs/solutions/ asserted as a prose invariant. MIGRATION: a pre-existing enabled profile override for this skill that lacks the docs/solutions/ token is dropped at runtime (shipped prose served, warning logged) until its author re-adds the token."
raw_prose: |
  # SDD — QA (Verify and Review)

  **Checkpoint first.** You MUST confirm the implementation (`src/`) and its tests (`tests/`) exist
  before reviewing — if they do not, you skipped build; STOP and go back. You MUST record the gate
  results in `docs/qa/<slug>.md` (**Checks** + **Review**), and you MUST codify what this task
  taught you to `docs/solutions/<slug>.md` before advancing to ship. You MUST NOT add features or
  new scope here — QA verifies, it does not build.

  Build proved each task green against its designed cases. QA is the wider net:
  the whole change at once, not one task at a time — does it actually do what
  spec promised, does the *full* suite pass, and does it clear the bar a human
  would block a merge on? This is the last gate before ship.

  ## 1. Run the full bar

  Read your work-item contract first (`.agentalloy/contracts/qa/<slug>.md`, which
  build authored — the proxy front-loaded the verification skills for it on
  entry). Then run everything — the **CI** system skill names the exact commands
  — and record the real results, not "should pass":

  - the **whole** test suite, integration included (build only proved the units)
  - the linter — clean
  - the type checker — clean

  A red anything stops here: fix it (back to **build** if it's a code defect —
  `agentalloy phase set build`) before you review. Green is the floor, not the
  finish line.

  ## 2. Check it against spec and design

  Open `docs/spec/<slug>.md` and `docs/design/<slug>/`. Verify:

  - **every acceptance criterion is met** — each AC-N has a test proving it, and
    the behavior is real, not faked to satisfy a test.
  - **non-goals were respected** — nothing on the Out of Scope list got built.
  - **no drift** — the implementation matches the design's approach, or the
    divergence is deliberate and noted, not an accident.

  ## 3. Review the change

  Read the diff across these axes; flag what you find, labelled by severity
  (**Critical** blocks merge; plain = required before ship; **Nit/Optional** =
  the author's call):

  - **Correctness** — edge cases, error paths, off-by-ones, races.
  - **Security** — input validated, secrets out of code, authz checked, queries
    parameterized, external data treated as untrusted.
  - **Readability** — clear names, straight control flow, no clever tricks, no
    abstraction that hasn't earned its keep.
  - **Architecture** — fits existing patterns, clean boundaries, no needless
    duplication.
  - **Performance** — no N+1s, unbounded fetches, or hot-path waste.

  Then sweep for dead code the change orphaned — list it, and ask before
  deleting anything you didn't add.

  ## 4. Record it, then route

  Write the verdict to **`docs/qa/<slug>.md`** with `## Checks` (the suite, lint,
  and type results) and `## Review` (the findings + the spec/non-goals verdict).
  A clean report — green bar, every AC met, no open Critical or required finding
  — clears the way to ship.

  On a clean report, seed **ship's work-item** before you go:

      agentalloy contract init --phase ship --slug <task-slug>

  Fill `domain_tags` with the *delivery surface* (release, changelog, migration,
  rollout — whatever shipping this touches) and write the body as what to ship
  and how to make it reversible. That body is ship's retrieval prompt, so
  delivery opens already primed.

  **Codify what you learned.** Before you advance, write `docs/solutions/<slug>.md`
  — the compounding step, and the last thing this task does: the problem you
  solved, the approach that worked, what you tried that *didn't*, and any decision
  worth keeping. Keep it concrete and short — a real lesson, not a restatement of
  the diff — so the next task starts smarter instead of from zero. Once a lesson
  proves it recurs, promote it into the corpus with `agentalloy lessons promote
  <slug>` so the signal layer front-loads it automatically next time.

  Advance yourself: `agentalloy phase set ship`, and go straight into delivery.
  Don't wait to be told; a clean report *is* the signal. The phase guard refuses
  the jump until `docs/qa/<slug>.md` exists with its `## Checks` and `## Review`
  sections **and** `docs/solutions/<slug>.md` records this task's lesson, so a
  premature `phase set` just names what's missing.

  Anything open routes by *cause*, and you don't fix code here: the report is
  the worklist for the phase that does. Don't advance to ship with an open
  Critical or required finding — route it back instead.

  - **code defect** → `agentalloy phase set build`; build reproduces it as a
    failing test first, so the bug earns a regression test on the way out.
  - **design flaw** (the approach is wrong, not just the code) →
    `agentalloy phase set design`.
  - **spec gap** (an acceptance criterion was wrong or missing) →
    `agentalloy phase set spec`.
  - **nit / optional** → fix in place; it's not a blocker and doesn't need a
    test of its own.

  The change comes back through QA once the fix lands. There's no iteration cap
  — re-review until the report is clean.

  ## Not this

  Don't rubber-stamp — "tests pass" is necessary, not sufficient; the review is
  the point. Don't treat every nit as a blocker (you'll never ship) or wave
  through a Critical (you'll ship the bug). Don't re-review the unit behaviors
  design already specified — QA is about the whole: the integration, the
  regressions, the human-judgment axes. And don't fix a real defect in place:
  QA reviews, it doesn't write `src/` — a fix made here skips the red test and
  ships uncovered. Route it back instead.

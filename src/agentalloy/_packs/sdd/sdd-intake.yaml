skill_id: sdd-intake
canonical_name: SDD — Intake (sdd-intake)
description: "Open every session: check for work in progress (resume or new), then for new work run a short intent interview, decide full SDD vs the fast lane, and write a contract that hands off to the chosen route."
category: operational
skill_class: workflow
domain_tags:
  - spec-driven-development
  - intake
  - intent-interview
  - scoping
requires: []
always_apply: false
applies_to_phases:
  - intake
# Load-bearing command tokens not derivable from exit_gates: the forward routes
# out of intake. A customization may reword the prose but must keep these
# verbatim, or the phase machine has no documented way to advance.
prose_invariants:
  - "agentalloy phase set spec"
  - "agentalloy phase set sdd-fast"
exit_gates:
  artifact_exists:
    path: ".agentalloy/contracts/**/*.md"
signal_keywords:
  - scope is clear
  - ready to scope
  - start spec
  - begin work
  - next phase
contract_template: |
  ---
  phase: intake
  task_slug: {{task_slug}}
  route: {{route}}
  domain_tags: []
  scope:
    touches: []
    avoids: []
  success_criteria: []
  related_contracts: []
  created_at: {{created_at}}
  ---

  # {{task_slug}}

  ## What the user actually wants

  <one-paragraph restatement of the request in concrete, checkable terms>

  ## Intent signals

  - intent: <new-build | change-existing | investigate | review | other>
  - artifact_type: <feature | fix | refactor | doc | spike | ...>
  - scope: <small | medium | large> — <what it touches / avoids>
  - urgency: <now | soon | someday>

  ## Proposed route

  <full SDD or sdd-fast (the fast lane), and why — default is full>
# Workflow skills are selected by applies_to_phases (signal layer), not by
# phase_scope, so this is left empty and scoped via category instead.
phase_scope: []
category_scope: [process]
author: navistone
change_summary: "two-tier cascade: intake authors the next phase's work-item contract (contracts/spec/ or contracts/sdd-fast/) with the work's technology domain_tags + a concrete request body that becomes that phase's retrieval prompt — prior-authors-next, so each phase opens already primed; resume-aware front door + full/fast routing unchanged"
raw_prose: |
  # SDD — Intake

  **You MUST NOT design, plan, or write code in this phase.** Intake produces exactly one
  artifact — the contract under `.agentalloy/contracts/` — and nothing else. If you catch
  yourself proposing a solution, STOP: that is spec/design work, and you have not earned it yet.

  You open every session. Before any work, settle two things: **what are we
  doing**, and **how much process does it need**.

  ## 1. Resume or new?

  The injected session state (or `.agentalloy/phase`) tells you the current
  phase. If it names a phase other than `intake`, there's work in flight — say
  where the user left off (the phase + the active contract in
  `.agentalloy/contracts/`) and ask: **pick up there, or start something new?**

  - *Resume* → step aside; that phase takes back over on the next turn. Don't
    re-interview.
  - *New* → reset with `agentalloy phase set intake`, then continue below.

  Nothing in progress (fresh repo, or the last work just shipped)? Continue.

  ## 2. Frame it (briefly)

  Ask only what you can't infer. You need just enough to answer one question —
  **full SDD, or the fast lane?**

  - **Full** (`spec → design → build → qa → ship`): new surface area, real design
    choices, multiple components, risky or hard to reverse, or fuzzy acceptance.
  - **Fast** (`sdd-fast` — one compressed spec-build-test-deliver): you could
    confidently land it in a single PR with an obvious "done" — a small fix, a
    localized change, a well-understood tweak.

  When in doubt, choose **full**. The fast lane is only for work that's *clearly*
  bounded — and if `sdd-fast` turns out harder than it looked, it bails back to
  `spec`, so under-calling it isn't a trap.

  ## 3. Hand off the next phase's work-item

  Intake doesn't keep a contract of its own — it writes the **work-item the next
  phase picks up**, into that phase's contract folder:

      agentalloy contract init --phase spec --slug <task-slug>       # full lane
      # or, for the fast lane:
      agentalloy contract init --phase sdd-fast --slug <task-slug>

  Fill `domain_tags` with the work's *technology surface* (the concrete tech it
  touches — not process words like "spec" or "build") and write the body as a
  concrete restatement of what the user wants. That body becomes the next phase's
  retrieval prompt: on entry the proxy front-loads the skills matching it, so the
  next phase starts already primed. Set `scope.touches` too. Writing the contract
  completes intake. Advance to the route you agreed: `agentalloy phase set spec`
  for the full lane, or `agentalloy phase set sdd-fast` for the fast lane. (The
  contract write also advances on the next turn, so the new phase opens either
  way; running it yourself just keeps you moving now.) Stop here only if the route
  itself is genuinely unclear — surface that and let the user make the call.

  ## Not this

  Intake is light, not a gate to fight. Don't write the spec, acceptance
  criteria, or a design here — just enough to know *what* the work is and
  *which lane* it takes. Once you hand off, normal phase composition resumes.

change_summary: resume-aware intake front door + full/fast routing decision
raw_prose: |
  # SDD — Intake

  You open every session. Before any work, settle two things: **what are we
  doing**, and **how much process does it need**.

  ## 1. Resume or new?

  The injected session state (or `.agentalloy/phase`) tells you the current
  phase. If it names a phase other than `intake`, there's work in flight — say
  where the user left off (the phase + the active contract in
  `.agentalloy/contracts/`) and ask: **pick up there, or start something new?**

  - *Resume* → step aside; that phase takes back over on the next turn. Don't
    re-interview.
  - *New* → reset with `agentalloy phase set intake`, then continue below.

  Nothing in progress (fresh repo, or the last work just shipped)? Continue.

  ## 2. Frame it (briefly)

  Ask only what you can't infer. You need just enough to answer one question —
  **full SDD, or the fast lane?**

  - **Full** (`spec → design → build → qa → ship`): new surface area, real design
    choices, multiple components, risky or hard to reverse, or fuzzy acceptance.
  - **Fast** (`sdd-fast` — one compressed spec-build-test-deliver): you could
    confidently land it in a single PR with an obvious "done" — a small fix, a
    localized change, a well-understood tweak.

  When in doubt, choose **full**. The fast lane is only for work that's *clearly*
  bounded — and if `sdd-fast` turns out harder than it looked, it bails back to
  `spec`, so under-calling it isn't a trap.

  ## 3. Contract + route

  Capture the agreed scope and the route, then write the contract:

      agentalloy contract init --phase intake --slug <task-slug> --route <full|fast>

  Fill `domain_tags` and `scope.touches` honestly — they focus retrieval
  downstream. Writing the contract completes intake; it hands off to **spec**
  (full) or **sdd-fast** (fast) automatically.

  ## Not this

  Intake is light, not a gate to fight. Don't write the spec, acceptance
  criteria, or a design here — just enough to know *what* the work is and
  *which lane* it takes. Once you hand off, normal phase composition resumes.

skill_id: sdd-add-skill
canonical_name: SDD — Add a Custom Skill (add-skill)
description: "Author a custom skill for this repo's local corpus: pick the skill class, draft prose + fragments, self-critique against the R1-R9 authoring contract, scaffold and validate the pack, then stop for explicit human approval before install — the deliverable is an installed corpus skill, not a code change."
category: operational
skill_class: workflow
domain_tags:
  - skill-authoring
  - custom-skill
  - corpus
  - skill-pack
requires:
  - sys-skill-authoring-rules
  - sys-r1-tiered-sourcing
  - sys-skill-tagging-rules
  - sys-fragment-types-and-sizing
  - sys-skill-naming
  - sys-skill-output-formatting
  - sys-skill-writing-voice
always_apply: false
applies_to_phases:
  - add-skill
# Load-bearing command tokens not derivable from exit_gates: the validate loop
# and the human sign-off that releases the exit gate. A customization may reword
# the prose but must keep these verbatim.
prose_invariants:
  - "agentalloy validate-pack"
  - "agentalloy approve add-skill"
exit_gates:
  all_of:
    - artifact_exists:
        path: ".agentalloy/custom-skills/**/*.yaml"
    # Unconditional human checkpoint — unlike sdd-fast's flag-gated one:
    # installing a skill changes what gets composed into every future session
    # in this repo. `agentalloy approve add-skill` writes the marker; editing
    # the skill YAML after approval makes the marker stale and re-blocks.
    - approval_recorded:
        since: ".agentalloy/custom-skills/**/*.yaml"
signal_keywords:
  - ready to install
  - install the skill
  - looks good
  - approve
  - ship the skill
contract_template: |
  ---
  phase: add-skill
  task_slug: {{task_slug}}
  route: add-skill
  domain_tags: []
  scope:
    touches: []
    avoids: []
  success_criteria: []
  related_contracts: []
  created_at: {{created_at}}
  ---


author: navistone
change_summary: "rewrite as a tight, contract-driven spec (assumptions → checkable acceptance → explicit non-goals, docs/spec/<slug>.md); drop the concatenated source skills, ASCII pipeline, six-area template, and the runtime-injected eval block"
raw_prose: |
  # SDD — Spec

  Intake handed you a contract: the *what*, and a decision that this needs the
  full lane. Your job is the highest-leverage step in the pipeline — turn that
  fuzzy "what" into a spec precise enough that design and build can't drift:
  scope, checkable acceptance, explicit non-goals. Bad specs cascade downstream
  into bad designs and bad code; this is where you stop them.

  ## 1. Start from the contract

  Read `.agentalloy/contracts/intake/<slug>.md` — you already have the request
  and the agreed scope. Sharpen what's there; don't re-interview from scratch.

  ## 2. Surface your assumptions first

  Before writing a line of spec, list what you're assuming — stack, data model,
  auth, the boundary of "this" — and have the user correct them:

      Assuming: session cookies (not JWT), Postgres (existing schema), web only.
      Correct me now, or I build on these.

  A silent assumption is the most expensive misunderstanding there is. The spec
  exists to surface them *before* code does.

  ## 3. Reframe the ask into checkable acceptance

  Translate every vague want into a condition a test or a person can mark
  true/false:

      "make the dashboard faster"  →  LCP < 2.5s on 4G, data load < 500ms

  If you can't make a requirement checkable, it isn't a requirement yet —
  resolve it with the user, don't guess.

  ## 4. Name what you're NOT doing

  Write the non-goals down. An "Out of Scope" list is the cheapest scope control
  there is, and the first thing you point at when the work starts to sprawl.

  ## 5. Write it + hand off

  Two artifacts, each with one job. The **contract** carries what the machinery
  reads — seed it, reusing the intake slug so the work chains:

      agentalloy contract init --phase spec --slug <task-slug>

  Fill `domain_tags` (they focus retrieval) and `scope.touches/avoids` (they
  bound where you work). The **spec doc** is the deliverable and the single
  source of truth for acceptance — write it to **`docs/spec/<task-slug>.md`**
  with `## Acceptance Criteria` and `## Out of Scope`. Don't copy acceptance
  back into the contract; one home, no drift. That file completes spec.

  Then advance yourself — don't wait to be told. The moment the spec is written
  and unambiguous, run `agentalloy phase set design` and carry straight on into
  design. If anything's still unresolved — an assumption the user hasn't
  confirmed, an acceptance criterion you can't make checkable — **stop and
  surface it** instead of advancing; resolve it first. The phase guard refuses
  the jump until `docs/spec/<slug>.md` exists with its required sections, so a
  premature `phase set` just tells you what's still missing.

  ## Not this

  Don't design the solution here — no architecture, no file-by-file plan;
  that's design's job, and doing it now locks in choices you haven't earned.
  Don't pad the spec with boilerplate the repo already documents (build
  commands, directory layout). Don't leave acceptance fuzzy to "figure out
  later" — later is more expensive. And if it now feels too small for the full
  lane, intake over-called it: bail with `agentalloy phase set sdd-fast`.

skill_id: sdd-spec-and-scoping
canonical_name: SDD — Spec and Scoping (sdd-spec)
description: "Turn the intake contract's fuzzy ask into a spec design and build can't drift from: surface assumptions, reframe wants into checkable acceptance, and name explicit non-goals — written to docs/spec/<slug>.md."
category: operational
skill_class: workflow
domain_tags:
  - spec-driven-development
  - scoping
  - acceptance-criteria
  - non-goals
  - user-intent
requires: []
always_apply: false
applies_to_phases:
  - spec
# Load-bearing command token not derivable from exit_gates: the forward advance
# to design. A customization may reword the prose but must keep it verbatim.
prose_invariants:
  - "agentalloy phase set design"
exit_gates:
  all_of:
    - artifact_exists:
        path: docs/spec/*.md
    - artifact_contains:
        path: docs/spec/*.md
        sections:
          - Acceptance Criteria
          - Out of Scope
signal_keywords:
  - done with spec
  - ready to design
  - acceptance is clear
  - next phase
contract_template: |
  ---
  phase: spec
  task_slug: {{task_slug}}
  route: full
  domain_tags: []
  scope:
    touches: []
    avoids: []
  success_criteria: []
  related_contracts: []
  created_at: {{created_at}}
  ---

  # {{task_slug}}

  ## Scope in a sentence

  <what this changes, and the boundary of "this">

  ## Spec

  Acceptance criteria and out-of-scope live in docs/spec/{{task_slug}}.md.
# Workflow skills are selected by applies_to_phases (signal layer), not by
# phase_scope, so this is left empty and scoped via category instead.
phase_scope: []
category_scope: [process]
author: navistone
change_summary: "two-tier cascade: spec reads its incoming work-item from contracts/spec/ (intake authored) and hands off by seeding design's work-item in contracts/design/ with the design-surface domain_tags + a body that becomes design's retrieval prompt; spec doc stays the single acceptance source (assumptions → checkable acceptance → non-goals, docs/spec/<slug>.md)"
raw_prose: |
  # SDD — Spec

  **Checkpoint first.** You MUST confirm intake's contract exists under
  `.agentalloy/contracts/` before scoping — if it does not, you skipped intake; STOP and go back.
  You MUST write `docs/spec/<slug>.md` with its **Acceptance Criteria** and **Out of Scope**
  sections. You MUST NOT design solutions or touch `src/` here — spec settles *what* and *done*,
  never *how*.

  Intake handed you a contract: the *what*, and a decision that this needs the
  full lane. Your job is the highest-leverage step in the pipeline — turn that
  fuzzy "what" into a spec precise enough that design and build can't drift:
  scope, checkable acceptance, explicit non-goals. Bad specs cascade downstream
  into bad designs and bad code; this is where you stop them.

  ## 1. Start from the contract

  Read `.agentalloy/contracts/spec/<slug>.md` — the work-item intake handed you
  (the request and agreed scope), and the domain skills the proxy already
  front-loaded from it on entry. Sharpen what's there; don't re-interview from
  scratch.

  ## 2. Surface your assumptions first

  Before writing a line of spec, list what you're assuming — stack, data model,
  auth, the boundary of "this" — and have the user correct them:

      Assuming: session cookies (not JWT), Postgres (existing schema), web only.
      Correct me now, or I build on these.

  A silent assumption is the most expensive misunderstanding there is. The spec
  exists to surface them *before* code does.

  ## 3. Reframe the ask into checkable acceptance

  Translate every vague want into a condition a test or a person can mark
  true/false:

      "make the dashboard faster"  →  LCP < 2.5s on 4G, data load < 500ms

  If you can't make a requirement checkable, it isn't a requirement yet —
  resolve it with the user, don't guess.

  ## 4. Name what you're NOT doing

  Write the non-goals down. An "Out of Scope" list is the cheapest scope control
  there is, and the first thing you point at when the work starts to sprawl.

  ## 5. Write it + hand off

  The **spec doc** is the deliverable and the single source of truth for
  acceptance — write it to **`docs/spec/<task-slug>.md`** with
  `## Acceptance Criteria` and `## Out of Scope`. That file completes spec.

  Then seed **design's work-item** — the contract the design phase opens on,
  reusing the slug so the work chains:

      agentalloy contract init --phase design --slug <task-slug>

  Fill `domain_tags` with the *design surface* (the tech and patterns design will
  reason about — `caching`, `async`, `postgres-schema`, not process words) and
  write the body as what design must produce for this feature; set
  `scope.touches/avoids`. That body is design's retrieval prompt, so on entry the
  proxy front-loads the matching skills. Don't copy acceptance into it — the spec
  doc is acceptance's one home, no drift.

  Then advance yourself — don't wait to be told. The moment the spec is written
  and unambiguous, run `agentalloy phase set design` and carry straight on into
  design. If anything's still unresolved — an assumption the user hasn't
  confirmed, an acceptance criterion you can't make checkable — **stop and
  surface it** instead of advancing; resolve it first. The phase guard refuses
  the jump until `docs/spec/<slug>.md` exists with its required sections, so a
  premature `phase set` just tells you what's still missing.

  ## Not this

  Don't design the solution here — no architecture, no file-by-file plan;
  that's design's job, and doing it now locks in choices you haven't earned.
  Don't pad the spec with boilerplate the repo already documents (build
  commands, directory layout). Don't leave acceptance fuzzy to "figure out
  later" — later is more expensive. And if it now feels too small for the full
  lane, intake over-called it: bail with `agentalloy phase set sdd-fast`.

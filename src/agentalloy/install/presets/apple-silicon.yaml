preset: apple-silicon
description: "Apple Silicon (M1/M2/M3/M4) with Metal acceleration via llama-server (llama.cpp)"
defaults:
  RUNTIME_EMBED_BASE_URL: "http://localhost:47951"
  RUNTIME_EMBEDDING_MODEL: "nomic-embed-text-v1.5.Q8_0.gguf"
  SIGNAL_INTENT_BACKEND: "reranker"
  SIGNAL_INTENT_RERANK_URL: "http://127.0.0.1:47952"
  SIGNAL_INTENT_RERANK_MODEL: "Qwen3-Reranker-0.6B-Q8_0.gguf"
  # Stage B compose fragment re-ranker (lm_assist.py). v6.6.0: arbitrate on ALL
  # presets — the LM judge both fixes the free-text process-skill slot leak
  # (domain 0.816 vs 0.803 deterministic) and keeps process skills reachable
  # (name probes 0.93+ vs 0.44 under windowed demotion, now the opt-in
  # AGENTALLOY_PROCESS_DEMOTION fallback). Fails open on timeout/error.
  LM_ASSIST: "arbitrate"
  # Evict fragments the judge scores <= threshold. Scores are near-binary
  # (filler exactly 0.0, relevant 0.86+); 0.0 disables eviction entirely.
  LM_ASSIST_KEEP_THRESHOLD: "0.05"
  # 2s budget: warm K=8 ~485ms on Metal-class throughput (--parallel 2 -c 4096
  # launcher config), K=16 ~1s; headroom for cold-start and warmup-fallback.
  LM_ASSIST_TIMEOUT_MS: "2000"
  # The judge must see past the fused head: measured domain golds sit as deep
  # as fused rank ~11; probe reachability throttles at cap 8 (0.77 vs 0.93+
  # at 16). Requests beyond the --parallel slot count serialize at the server.
  LM_ASSIST_MAX_CANDIDATES: "16"
  # Per-fragment char cap (~600 tok) — prefill bound that keeps fat-corpus outliers
  # inside the Stage B budget.
  LM_ASSIST_DOC_CAP_CHARS: "2400"
  DEDUP_HARD_THRESHOLD: "0.92"
  DEDUP_SOFT_THRESHOLD: "0.80"
  BOUNCE_BUDGET: "3"
  LOG_LEVEL: "info"

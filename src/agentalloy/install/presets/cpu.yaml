preset: cpu
description: "CPU-only inference via llama-server (llama.cpp), no GPU acceleration"
defaults:
  RUNTIME_EMBED_BASE_URL: "http://localhost:47951"
  RUNTIME_EMBEDDING_MODEL: "nomic-embed-text-v1.5.Q8_0.gguf"
  SIGNAL_INTENT_BACKEND: "reranker"
  SIGNAL_INTENT_RERANK_URL: "http://127.0.0.1:47952"
  SIGNAL_INTENT_RERANK_MODEL: "Qwen3-Reranker-0.6B-Q8_0.gguf"
  # Stage B compose fragment re-ranker (lm_assist.py). v6.6.0: arbitrate on ALL
  # presets — the 2026-07-08 investigation (nightly 28931694381) showed the LM
  # judge is the only mechanism that both fixes the free-text process-skill
  # slot leak (domain 0.816 vs 0.803 deterministic) AND keeps process skills
  # reachable (name probes 0.93+ vs 0.44 under windowed demotion, which is now
  # the opt-in AGENTALLOY_PROCESS_DEMOTION fallback for LM-less deploys).
  # Fails open to the deterministic path on timeout/error. CPU viability:
  # rerank server runs --parallel 1 -c 2048 (start_rerank_server + container
  # entrypoint), warm single ~145ms on Xeon-class CPU.
  LM_ASSIST: "arbitrate"
  # Evict fragments the judge scores <= threshold. Scores are near-binary:
  # filler exactly 0.0, relevant 0.86+ — 0.05 is a robust separator. 0.0
  # disables eviction entirely (keeps everything >= 0): the pre-v6.6.0
  # misconfiguration that made arbitrate keep-everything.
  LM_ASSIST_KEEP_THRESHOLD: "0.05"
  # 3s budget: 16 candidates x ~145ms warm =~ 2.3s full batch; headroom for
  # cold-start and slower CPUs, fails open beyond it.
  LM_ASSIST_TIMEOUT_MS: "3000"
  # The judge must see past the fused head: measured domain golds sit as deep
  # as fused rank ~11, and probe reachability throttles at cap 8 (0.77 vs
  # 0.93+ at 16).
  LM_ASSIST_MAX_CANDIDATES: "16"
  # Same per-fragment char cap as GPU (~600 tok prefill bound).
  LM_ASSIST_DOC_CAP_CHARS: "2400"
  DEDUP_HARD_THRESHOLD: "0.92"
  DEDUP_SOFT_THRESHOLD: "0.80"
  BOUNCE_BUDGET: "3"
  LOG_LEVEL: "info"

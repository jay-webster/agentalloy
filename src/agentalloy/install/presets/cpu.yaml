preset: cpu
description: "CPU-only inference via llama-server (llama.cpp), no GPU acceleration"
defaults:
  RUNTIME_EMBED_BASE_URL: "http://localhost:47951"
  RUNTIME_EMBEDDING_MODEL: "nomic-embed-text-v1.5.Q8_0.gguf"
  SIGNAL_INTENT_BACKEND: "reranker"
  SIGNAL_INTENT_RERANK_URL: "http://127.0.0.1:47952"
  SIGNAL_INTENT_RERANK_MODEL: "Qwen3-Reranker-0.6B-Q8_0.gguf"
  # Stage B compose fragment re-ranker (lm_assist.py). OFF on CPU — not viable at
  # the budget. Measured 2026-07-09 on the shipped `--parallel 1 -c 2048` reranker:
  # real (distinct-doc) scoring is ~1800ms/candidate, and production telemetry
  # (11,162 traces) isolates Stage B at ~6.6s median / ~11s p90 added latency vs
  # the 203ms deterministic path — 2.3x the 3000ms budget, so real composes time
  # out and fail open. The earlier "~145ms warm / ~2.3s per 16 = viable" reading
  # was a KV-cache-reuse artifact (re-scoring identical inputs), NOT the varied-
  # fragment production path. GPU presets keep `arbitrate` (Vulkan ~120ms/candidate
  # ≈ 1.9s/16 fits). The contract path (tag-scoped compose) already evicts the
  # process-skill filler deterministically at 203ms, so CPU loses nothing here.
  # The knobs below are inert while off — they document what a manual re-enable
  # on a fast CPU (with a raised budget) would use.
  LM_ASSIST: "off"
  LM_ASSIST_KEEP_THRESHOLD: "0.05"
  LM_ASSIST_TIMEOUT_MS: "3000"
  LM_ASSIST_MAX_CANDIDATES: "16"
  LM_ASSIST_DOC_CAP_CHARS: "2400"
  DEDUP_HARD_THRESHOLD: "0.92"
  DEDUP_SOFT_THRESHOLD: "0.80"
  BOUNCE_BUDGET: "3"
  LOG_LEVEL: "info"

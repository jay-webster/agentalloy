preset: radeon
description: "AMD Radeon GPU (dGPU or iGPU) with Vulkan/ROCm acceleration via llama-server (llama.cpp)"
defaults:
  RUNTIME_EMBED_BASE_URL: "http://localhost:47951"
  RUNTIME_EMBEDDING_MODEL: "nomic-embed-text-v1.5.Q8_0.gguf"
  SIGNAL_INTENT_BACKEND: "reranker"
  SIGNAL_INTENT_RERANK_URL: "http://127.0.0.1:47952"
  SIGNAL_INTENT_RERANK_MODEL: "Qwen3-Reranker-0.6B-Q8_0.gguf"
  # Stage B compose fragment re-ranker (lm_assist.py) — on for GPU presets,
  # off for cpu (can't score real fragments inside the budget). 1500ms gives
  # GPU headroom over the 600ms code default. On a shared-VRAM APU iGPU this
  # contends with the embedder + intent reranker; drop to off if the budget bites.
  LM_ASSIST: "arbitrate"
  # 2s budget: ample headroom for cold-start (~1.2s) and warmup-fallback recovery;
  # warm K=8 lands at ~485ms on GPU (--parallel 2 -c 4096 launcher config — see
  # start_rerank_server.rerank_launch_args).
  LM_ASSIST_TIMEOUT_MS: "2000"
  # Candidate fan-out == reranker --parallel slot count (start_rerank_server.py);
  # bounds both scorer pools so Stage B + intent can't oversubscribe the slots.
  LM_ASSIST_MAX_CANDIDATES: "8"
  # Per-fragment char cap (~600 tok) — prefill bound that keeps fat-corpus outliers
  # inside the Stage B budget. (keep_threshold is deliberately NOT set: it stays the
  # inert code default, gated-off, pending a P(yes) measurement.)
  LM_ASSIST_DOC_CAP_CHARS: "2400"
  DEDUP_HARD_THRESHOLD: "0.92"
  DEDUP_SOFT_THRESHOLD: "0.80"
  BOUNCE_BUDGET: "3"
  LOG_LEVEL: "INFO"

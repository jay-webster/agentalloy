name: Container Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Rapid merges to main otherwise race the corpus job before the first run
# saves its cache, duplicating the ~100-min embed. Newest push wins; the
# superseded build is cancelled (only its image would have been stale anyway).
# Ref-scoped so a release-tag build and a main build don't cancel each other —
# they produce different tags from (usually) the same commit.
concurrency:
  group: container-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build the corpus once per pack-content change (cache-keyed) so published
  # images ship a prebuilt corpus and users skip the ~100-min CPU embed.
  # Mirrors corpus-nightly.yml's build steps; see that file for timing notes.
  # NOTE: the corpus is built on amd64 and baked into both arches — DuckDB's
  # storage format is platform-independent and both targets are little-endian;
  # verify the arm64 image on first dispatch per repo convention.
  build-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      XDG_CONFIG_HOME: ${{ github.workspace }}/.xdg/config
      XDG_DATA_HOME: ${{ github.workspace }}/.xdg/data
    steps:
      - uses: actions/checkout@v4

      - name: Cache prebuilt corpus (keyed on pack content)
        id: corpus-cache
        uses: actions/cache@v4
        with:
          path: corpus-seed
          # The corpus content is a function of pack content + the embedding
          # model, NOT the full dependency lockfile. Keying on uv.lock busted the
          # cache on every release (a version bump rewrites uv.lock), forcing a
          # needless ~40-min corpus rebuild even when no pack changed. Key on
          # pack content only — matching the corpus-stamp packs_hash below.
          #
          # The vN prefix is the manual corpus-format lever: bump it whenever the
          # indexed representation changes WITHOUT a pack-content change (e.g. a
          # new embedding model, or a dep upgrade that alters embeddings/storage),
          # else the cache serves stale-format corpora forever. v3 = nomic-embed-
          # text 768-dim (was qwen3-embedding 1024) — invalidates any cached
          # 1024 / empty-embeddings corpus from the v2.0 transition. v5 = the v5.0.0
          # two-engine migration (LanceDB fragments.lance + DuckDB agentalloy.duck,
          # replacing ladybug + skills.duck): the storage FORMAT changed with no
          # pack-content change, so v3 would have served the old-format seed (which
          # it did — v5.0.0's build cache-hit baked ladybug+skills.duck, and the
          # entrypoint crash-looped on the missing agentalloy.duck).
          key: corpus-seed-v5-${{ hashFiles('src/agentalloy/_packs/**') }}

      - name: Install uv
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: uv sync --frozen

      - name: Generate .env + pull models, start embed server (nomic, llama-server)
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        timeout-minutes: 30
        run: |
          set -euxo pipefail
          mkdir -p "${XDG_CONFIG_HOME}/agentalloy" "${XDG_DATA_HOME}/agentalloy"
          # cpu preset points the embed server at the llama-server port (47951)
          # and selects nomic-embed-text-v1.5 (768-dim). Ollama was dropped in
          # v1.3.1; the embedder went to nomic in v2.0.
          uv run agentalloy write-env --preset cpu --port 47950 --force
          cat > recommend-models.json <<'JSON'
          {"schema_version": 1, "preset": "cpu", "selected_runner": "llama-server",
           "options": [{"default": true,
             "embed_model": "nomic-embed-text-v1.5.Q8_0.gguf", "embed_runner": "llama-server",
             "rerank_model": "Qwen3-Reranker-0.6B-Q8_0.gguf", "rerank_runner": "llama-server"}]}
          JSON
          uv run agentalloy pull-models --models recommend-models.json --runner llama-server
          uv run agentalloy start-embed-server --models recommend-models.json --timeout 120

      - name: Build corpus (ingest + re-embed all packs)
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        timeout-minutes: 130
        run: |
          set -euxo pipefail
          uv run agentalloy install-packs --packs all --non-interactive --no-restart

      - name: Verify corpus embeddings (do not bake a broken/empty corpus)
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          # install-packs treats a reembed failure as non-fatal (logs a WARN and
          # exits 0), so assert the corpus actually has 768-dim embeddings here —
          # otherwise a dim-mismatch / embed failure would silently ship an
          # empty-embeddings image that 503s on /compose.
          uv run python - <<'PY'
          import os

          from agentalloy.storage.fragment_store import LanceFragmentStore

          p = f"{os.environ['XDG_DATA_HOME']}/agentalloy/corpus/fragments.lance"
          fs = LanceFragmentStore(p)
          n = fs.count_embeddings()
          dim = fs.embedding_dim()
          fs.close()
          print(f"embeddings={n} dim={dim}")
          assert n and n > 1000, f"too few embeddings ({n}) — reembed likely failed"
          assert dim == 768, f"embedding dim {dim} != 768"
          PY

      - name: Stage corpus seed + stamp
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          mkdir -p corpus-seed
          cp "${XDG_DATA_HOME}/agentalloy/corpus/agentalloy.duck" corpus-seed/agentalloy.duck
          cp -a "${XDG_DATA_HOME}/agentalloy/corpus/fragments.lance" corpus-seed/fragments.lance
          cat > corpus-seed/corpus-stamp.json <<EOF
          {
            "embedding_model": "nomic-embed-text-v1.5.Q8_0.gguf",
            "embedding_dim": 768,
            "packs_hash": "${{ hashFiles('src/agentalloy/_packs/**') }}",
            "git_sha": "${{ github.sha }}",
            "built_at": "$(date -u -Iseconds)"
          }
          EOF

      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpus-seed
          path: corpus-seed/
          retention-days: 14
          if-no-files-found: error

  build-latest:
    runs-on: ubuntu-latest
    needs: build-corpus
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt corpus
        uses: actions/download-artifact@v4
        with:
          name: corpus-seed
          path: corpus-seed/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            # Release pinning: pushing tag vX.Y.Z publishes ghcr.io/...:X.Y.Z
            type=semver,pattern={{version}}

      # Optional: authenticate to Docker Hub so the `python:3.12-slim` base pull
      # uses authenticated (much higher) rate limits and a more reliable token
      # path. Dormant until DOCKERHUB_USERNAME/DOCKERHUB_TOKEN repo secrets exist
      # — secrets can't be referenced in `if:` directly, so mirror to env first.
      - name: Log in to Docker Hub (optional — set DOCKERHUB_* secrets to enable)
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Transient Docker Hub failures (auth.docker.io 520s, anonymous pull-rate
      # 429s) while fetching the base image must not fail a release. Attempt 1 is
      # non-fatal; on failure we pause and retry once — two tries defeat nearly
      # all transient blips. For configurable attempts/backoff, swap this pair
      # for nick-fields/retry wrapping a raw `docker buildx build`.
      - name: Build and push (latest — lightweight, no model) — attempt 1
        id: build_latest_1
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PULL_MODEL=false

      - name: Backoff before retry (latest)
        if: steps.build_latest_1.outcome == 'failure'
        run: sleep 30

      - name: Build and push (latest — lightweight, no model) — attempt 2
        if: steps.build_latest_1.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PULL_MODEL=false

  build-full:
    runs-on: ubuntu-latest
    needs: build-corpus
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt corpus
        uses: actions/download-artifact@v4
        with:
          name: corpus-seed
          path: corpus-seed/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,suffix=-full
            type=raw,value=full,enable={{is_default_branch}}
            # Release pinning: pushing tag vX.Y.Z publishes ghcr.io/...:X.Y.Z-full
            type=semver,pattern={{version}},suffix=-full

      # Optional Docker Hub auth — see the build-latest job for rationale.
      # Dormant until DOCKERHUB_USERNAME/DOCKERHUB_TOKEN repo secrets exist.
      - name: Log in to Docker Hub (optional — set DOCKERHUB_* secrets to enable)
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Two-attempt build with backoff — survives transient registry blips like
      # the auth.docker.io 520 that broke v3.0.3's first run. This is the heavier
      # image (pre-pulls the model), so it's the most exposed to such failures.
      - name: Build and push (full — model pre-pulled) — attempt 1
        id: build_full_1
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PULL_MODEL=true

      - name: Backoff before retry (full)
        if: steps.build_full_1.outcome == 'failure'
        run: sleep 30

      - name: Build and push (full — model pre-pulled) — attempt 2
        if: steps.build_full_1.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PULL_MODEL=true

  # On a release tag (vX.Y.Z) ONLY, publish the GitHub Release — but not until
  # both images have pushed. /releases/latest is what `agentalloy upgrade` reads,
  # so creating it before the image exists would make upgrade resolve a version
  # whose `ghcr.io/...:X.Y.Z` manifest 404s. Gating on the image jobs closes that
  # race. Idempotent: if a release was created by hand, just (re)mark it latest.
  release:
    runs-on: ubuntu-latest
    needs: [build-latest, build-full]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --generate-notes can diff from the last tag

      - name: Publish GitHub Release (after images are live)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — ensuring it is published and marked latest."
            gh release edit "$TAG" --latest --draft=false
          else
            echo "Creating release $TAG (both images are published)."
            gh release create "$TAG" --verify-tag --latest --generate-notes --title "$TAG"
          fi

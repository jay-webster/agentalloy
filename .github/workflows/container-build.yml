name: Container Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rapid merges to main otherwise race the corpus job before the first run
# saves its cache, duplicating the ~100-min embed. Newest push wins; the
# superseded build is cancelled (only its image would have been stale anyway).
concurrency:
  group: container-build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build the corpus once per pack-content change (cache-keyed) so published
  # images ship a prebuilt corpus and users skip the ~100-min CPU embed.
  # Mirrors corpus-nightly.yml's build steps; see that file for timing notes.
  # NOTE: the corpus is built on amd64 and baked into both arches — DuckDB's
  # storage format is platform-independent and both targets are little-endian;
  # verify the arm64 image on first dispatch per repo convention.
  build-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      XDG_CONFIG_HOME: ${{ github.workspace }}/.xdg/config
      XDG_DATA_HOME: ${{ github.workspace }}/.xdg/data
      OLLAMA_HOST: 127.0.0.1:11434
    steps:
      - uses: actions/checkout@v4

      - name: Cache prebuilt corpus (keyed on pack content + lockfile)
        id: corpus-cache
        uses: actions/cache@v4
        with:
          path: corpus-seed
          key: corpus-seed-${{ hashFiles('src/agentalloy/_packs/**', 'uv.lock') }}

      - name: Install uv
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: uv sync --frozen

      - name: Install + start Ollama, pull embed model
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: |
          set -euxo pipefail
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS "http://${OLLAMA_HOST}/api/version" >/dev/null 2>&1 && break
            sleep 1
          done
          ollama pull qwen3-embedding:0.6b

      - name: Build corpus (ingest + re-embed all packs)
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        timeout-minutes: 130
        run: |
          set -euxo pipefail
          mkdir -p "${XDG_CONFIG_HOME}/agentalloy" "${XDG_DATA_HOME}/agentalloy"
          uv run agentalloy write-env --preset cpu --port 47950 --force
          uv run agentalloy install-packs --packs all --non-interactive --no-restart

      - name: Stage corpus seed + stamp
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          mkdir -p corpus-seed
          cp -a "${XDG_DATA_HOME}/agentalloy/corpus/ladybug" corpus-seed/ladybug
          cp "${XDG_DATA_HOME}/agentalloy/corpus/skills.duck" corpus-seed/skills.duck
          cat > corpus-seed/corpus-stamp.json <<EOF
          {
            "embedding_model": "qwen3-embedding:0.6b",
            "embedding_dim": 1024,
            "packs_hash": "${{ hashFiles('src/agentalloy/_packs/**') }}",
            "git_sha": "${{ github.sha }}",
            "built_at": "$(date -u -Iseconds)"
          }
          EOF

      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpus-seed
          path: corpus-seed/
          retention-days: 14
          if-no-files-found: error

  build-latest:
    runs-on: ubuntu-latest
    needs: build-corpus
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt corpus
        uses: actions/download-artifact@v4
        with:
          name: corpus-seed
          path: corpus-seed/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (latest — lightweight, no model)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PULL_MODEL=false

  build-full:
    runs-on: ubuntu-latest
    needs: build-corpus
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt corpus
        uses: actions/download-artifact@v4
        with:
          name: corpus-seed
          path: corpus-seed/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,suffix=-full
            type=raw,value=full,enable={{is_default_branch}}

      - name: Build and push (full — model pre-pulled)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PULL_MODEL=true

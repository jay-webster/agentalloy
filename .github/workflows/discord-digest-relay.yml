name: Discord Digest Relay

# Bridges scheduled-drive-sync.md's routine (which runs in a sandbox with no
# egress to discord.com) to Discord: the routine fires a repository_dispatch
# event carrying the pre-formatted report, and this workflow -- running on
# ubuntu-latest with unrestricted egress -- relays it to Discord.
#
# DISCORD_WEBHOOK_URL is a repository secret, never referenced as a literal
# value anywhere in this file or logged -- GitHub redacts secret values from
# workflow logs automatically.

on:
  repository_dispatch:
    types: [discord-digest]

permissions:
  contents: read

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Relay report to Discord
        env:
          REPORT: ${{ github.event.client_payload.report }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: uv run python -m automation.ci.discord_relay

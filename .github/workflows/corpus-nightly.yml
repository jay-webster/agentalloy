name: Corpus Nightly Regression

# Builds the skill corpus from scratch every night, runs the retrieval
# self-audit + domain gold-hit probe against the live service, and fails on
# regression vs the committed baselines in eval/corpus_baselines.json.
#
# Inference runs on llama-server (llama.cpp): an embed server on :47951 and a
# reranker server on :47952 (the cpu preset points at both). pull-models
# provisions llama-server itself by downloading a prebuilt CPU build from the
# ggml-org GitHub releases (v1.3.3+) and downloads both GGUFs from Hugging Face —
# so this workflow no longer pre-provisions the binary; it dogfoods that path.
#
# NOTE: GitHub Actions cannot be exercised in the dev sandbox, so a few flag
# choices below are the most standard form and are flagged with a one-line
# comment; shake them out on the first manual dispatch.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: corpus-nightly
  cancel-in-progress: false

jobs:
  corpus-regression:
    runs-on: ubuntu-latest
    # Measured on first dispatch (run 27337187852): the 2-core runner embeds
    # ~29 fragments/min → ~102 min for the 2966-fragment corpus, plus ingest.
    # Sequential one-call-per-fragment embedding is the bottleneck; batching
    # would be the real speedup (future work). 180 covers the prebuilt
    # llama-server download (~15 MB, seconds) + GGUF download + full embed.
    timeout-minutes: 180
    env:
      # User-scoped AgentAlloy state lives under XDG dirs; point them at the
      # workspace so nothing touches the runner's home defaults.
      XDG_CONFIG_HOME: ${{ github.workspace }}/.xdg/config
      XDG_DATA_HOME: ${{ github.workspace }}/.xdg/data
      AGENTALLOY_URL: http://127.0.0.1:47950
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: llama-server prerequisites (libgomp1 + ~/.local/bin on PATH)
        timeout-minutes: 3
        run: |
          set -euxo pipefail
          # pull-models (v1.3.3+) downloads a prebuilt llama-server itself, so we
          # no longer copy the toolchain out of the llama.cpp image here — this
          # workflow now dogfoods that prebuilt-download path. Two prereqs remain:
          #   1. libgomp1 — the OpenMP runtime the prebuilt links against; it's the
          #      one dep not bundled in the release tarball.
          #   2. ~/.local/bin on PATH — pull-models installs the llama-server
          #      launcher there, and GITHUB_PATH applies to LATER steps (the
          #      start-*-server steps need to resolve it).
          sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write .env (cpu preset → user XDG config)
        timeout-minutes: 2
        run: |
          set -euxo pipefail
          mkdir -p "${XDG_CONFIG_HOME}/agentalloy" "${XDG_DATA_HOME}/agentalloy"
          # cpu preset points the embed server at :47951 and the reranker at
          # :47952 (SIGNAL_INTENT_BACKEND=reranker).
          uv run agentalloy write-env --preset cpu --port 47950 --force
          echo "--- generated .env ---"
          cat "${XDG_CONFIG_HOME}/agentalloy/.env"

      - name: Pull models (download prebuilt llama-server + both GGUFs)
        # Prebuilt llama-server download (~15 MB) plus ~1.2 GB of GGUF downloads
        # (embed + reranker). Generous ceiling so a slow HF/GitHub mirror can't
        # trip the step. This is the step that exercises the prebuilt path.
        timeout-minutes: 30
        run: |
          set -euxo pipefail
          # Minimal recommend-models.json so pull-models / start-*-server can
          # resolve the embed + reranker models without the interactive picker.
          cat > recommend-models.json <<'JSON'
          {"schema_version": 1, "preset": "cpu", "selected_runner": "llama-server",
           "options": [{"default": true,
             "embed_model": "nomic-embed-text-v1.5.Q8_0.gguf", "embed_runner": "llama-server",
             "rerank_model": "Qwen3-Reranker-0.6B-Q8_0.gguf", "rerank_runner": "llama-server"}]}
          JSON
          uv run agentalloy pull-models --models recommend-models.json --runner llama-server

      - name: Start embed server (llama-server, :47951)
        timeout-minutes: 5
        run: |
          set -euxo pipefail
          uv run agentalloy start-embed-server --models recommend-models.json --timeout 120

      - name: Start reranker server (llama-server, :47952)
        timeout-minutes: 5
        run: |
          set -euxo pipefail
          uv run agentalloy start-rerank-server --models recommend-models.json \
            --hardware-target cpu --timeout 120

      - name: Build corpus from scratch (ingest + re-embed all packs)
        timeout-minutes: 130
        run: |
          set -euxo pipefail
          # seed-corpus VERIFIES the in-repo seed corpus is present and valid
          # (preflight only — schema init happens inside install-packs via
          # _ensure_skill_schema). Non-fatal: a verification quirk on a
          # fresh runner must not mask the real ingest step below.
          uv run agentalloy seed-corpus || echo "seed-corpus verification non-fatal (fresh runner)"
          # Ingest every pack into agentalloy.duck and re-embed into fragments.lance.
          # This is the real install pipeline; --non-interactive avoids the TTY picker.
          uv run agentalloy install-packs --packs all --non-interactive --no-restart

      - name: Start AgentAlloy service
        timeout-minutes: 5
        run: |
          set -euxo pipefail
          # Settings reads config from the process env, not a cwd .env, so
          # source the user-scoped .env that write-env produced.
          set -a
          # shellcheck disable=SC1091
          . "${XDG_CONFIG_HOME}/agentalloy/.env"
          set +a
          uv run uvicorn agentalloy.app:app --host 127.0.0.1 --port 47950 \
            > service.log 2>&1 &
          # Wait for readiness before probing.
          for i in $(seq 1 60); do
            if curl -fsS "${AGENTALLOY_URL}/health" >/dev/null 2>&1; then
              echo "service healthy after ${i}s"; break
            fi
            if [ "$i" -eq 60 ]; then
              echo "service did not become healthy"; cat service.log; exit 1
            fi
            sleep 2
          done

      - name: Retrieval self-audit
        timeout-minutes: 15
        run: uv run python -m eval.retrieval_audit

      - name: Domain gold-hit probe
        timeout-minutes: 5
        run: uv run python -m eval.gold_hit

      - name: Check corpus regression vs baselines
        timeout-minutes: 2
        run: uv run python eval/check_corpus_regression.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-nightly-runs
          path: |
            eval/runs/*.json
            ${{ env.XDG_DATA_HOME }}/agentalloy/logs/embed-server.log
            ${{ env.XDG_DATA_HOME }}/agentalloy/logs/rerank-server.log
            service.log
          retention-days: 14

  # Runs the `-m integration` suite (real embed server, no mocked seams) —
  # the tests the PR pipeline can never run because they need llama-server.
  # Reuses the corpus job's provisioning recipe on its own runner; failures
  # open (or update) a labeled issue instead of failing anyone's PR.
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    env:
      XDG_CONFIG_HOME: ${{ github.workspace }}/.xdg/config
      XDG_DATA_HOME: ${{ github.workspace }}/.xdg/data
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (with code-index extra)
        run: uv sync --frozen --extra code-index

      - name: llama-server prerequisites (libgomp1 + ~/.local/bin on PATH)
        timeout-minutes: 3
        run: |
          set -euxo pipefail
          sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write .env (cpu preset → user XDG config)
        timeout-minutes: 2
        run: |
          set -euxo pipefail
          mkdir -p "${XDG_CONFIG_HOME}/agentalloy" "${XDG_DATA_HOME}/agentalloy"
          uv run agentalloy write-env --preset cpu --port 47950 --force

      - name: Pull models (prebuilt llama-server + GGUFs)
        timeout-minutes: 30
        run: |
          set -euxo pipefail
          cat > recommend-models.json <<'JSON'
          {"schema_version": 1, "preset": "cpu", "selected_runner": "llama-server",
           "options": [{"default": true,
             "embed_model": "nomic-embed-text-v1.5.Q8_0.gguf", "embed_runner": "llama-server",
             "rerank_model": "Qwen3-Reranker-0.6B-Q8_0.gguf", "rerank_runner": "llama-server"}]}
          JSON
          uv run agentalloy pull-models --models recommend-models.json --runner llama-server

      - name: Start embed server (llama-server, :47951)
        timeout-minutes: 5
        run: |
          set -euxo pipefail
          uv run agentalloy start-embed-server --models recommend-models.json --timeout 120

      - name: Integration tests
        timeout-minutes: 20
        run: uv run pytest -m integration -n0 -q

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-nightly-logs
          path: ${{ env.XDG_DATA_HOME }}/agentalloy/logs/embed-server.log
          retention-days: 14

      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --label nightly-integration --state open --json number -q '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Nightly integration run failed again: $RUN_URL"
          else
            gh issue create \
              --title "Nightly integration tests failing" \
              --label nightly-integration \
              --body "The nightly \`-m integration\` suite failed. Run: $RUN_URL — embed-server log attached as a run artifact. Auto-closes are manual: close this once the suite is green again."
          fi

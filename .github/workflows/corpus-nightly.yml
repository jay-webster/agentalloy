name: Corpus Nightly Regression

# Builds the skill corpus from scratch every night, runs the retrieval
# self-audit + domain gold-hit probe against the live service, and fails on
# regression vs the committed baselines in eval/corpus_baselines.json.
#
# Inference runs on llama-server (llama.cpp): an embed server on :47951 and a
# reranker server on :47952 (the cpu preset points at both). pull-models builds
# llama-server from source on the runner when it's not on PATH and downloads
# both GGUFs from Hugging Face.
#
# NOTE: GitHub Actions cannot be exercised in the dev sandbox, so a few flag
# choices below are the most standard form and are flagged with a one-line
# comment; shake them out on the first manual dispatch.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: corpus-nightly
  cancel-in-progress: false

jobs:
  corpus-regression:
    runs-on: ubuntu-latest
    # Measured on first dispatch (run 27337187852): the 2-core runner embeds
    # ~29 fragments/min → ~102 min for the 2966-fragment corpus, plus ingest.
    # Sequential one-call-per-fragment embedding is the bottleneck; batching
    # would be the real speedup (future work). Bumped from 150 → 180 to cover
    # the added from-source llama-server build (~5-10 min) + GGUF download.
    timeout-minutes: 180
    env:
      # User-scoped AgentAlloy state lives under XDG dirs; point them at the
      # workspace so nothing touches the runner's home defaults.
      XDG_CONFIG_HOME: ${{ github.workspace }}/.xdg/config
      XDG_DATA_HOME: ${{ github.workspace }}/.xdg/data
      AGENTALLOY_URL: http://127.0.0.1:47950
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Provision llama-server (from the ggml-org llama.cpp image)
        timeout-minutes: 10
        run: |
          set -euxo pipefail
          # pull-models only builds llama-server from source in INTERACTIVE mode;
          # in CI (no TTY) it skips the build and errors. So provision a known-good
          # binary the way the container image does (verified in v1.3.1): copy the
          # llama.cpp toolchain (binary + co-located .so libs) out of ggml-org's
          # image and front it with an LD_LIBRARY_PATH wrapper placed on PATH, so
          # pull-models / start-*-server find it instead of trying to build.
          LLAMA_DIR="$HOME/llamacpp"
          mkdir -p "$LLAMA_DIR" "$HOME/.local/bin"
          docker create --name lcp ghcr.io/ggml-org/llama.cpp:full
          docker cp lcp:/app/. "$LLAMA_DIR/"
          docker rm lcp
          # libgomp1 (OpenMP runtime) is the one dep not in the copied toolchain.
          sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
          cat > "$HOME/.local/bin/llama-server" <<WRAPPER
          #!/bin/sh
          export LD_LIBRARY_PATH="$LLAMA_DIR:\${LD_LIBRARY_PATH}"
          exec "$LLAMA_DIR/llama-server" "\$@"
          WRAPPER
          chmod +x "$HOME/.local/bin/llama-server"
          # GITHUB_PATH applies to later steps (pull-models etc.); verify directly here.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/llama-server" --version

      - name: Write .env (cpu preset → user XDG config)
        timeout-minutes: 2
        run: |
          set -euxo pipefail
          mkdir -p "${XDG_CONFIG_HOME}/agentalloy" "${XDG_DATA_HOME}/agentalloy"
          # cpu preset points the embed server at :47951 and the reranker at
          # :47952 (SIGNAL_INTENT_BACKEND=reranker).
          uv run agentalloy write-env --preset cpu --port 47950 --force
          echo "--- generated .env ---"
          cat "${XDG_CONFIG_HOME}/agentalloy/.env"

      - name: Pull models (build llama-server + download both GGUFs)
        # From-source llama-server build (~5-10 min) plus ~1.2 GB of GGUF
        # downloads (embed + reranker). Generous ceiling so a slow HF mirror or
        # a cold build cache can't trip the step.
        timeout-minutes: 30
        run: |
          set -euxo pipefail
          # Minimal recommend-models.json so pull-models / start-*-server can
          # resolve the embed + reranker models without the interactive picker.
          cat > recommend-models.json <<'JSON'
          {"schema_version": 1, "preset": "cpu", "selected_runner": "llama-server",
           "options": [{"default": true,
             "embed_model": "Qwen3-Embedding-0.6B-Q8_0.gguf", "embed_runner": "llama-server",
             "rerank_model": "Qwen3-Reranker-0.6B-Q8_0.gguf", "rerank_runner": "llama-server"}]}
          JSON
          uv run agentalloy pull-models --models recommend-models.json --runner llama-server

      - name: Start embed server (llama-server, :47951)
        timeout-minutes: 5
        run: |
          set -euxo pipefail
          uv run agentalloy start-embed-server --models recommend-models.json --timeout 120

      - name: Start reranker server (llama-server, :47952)
        timeout-minutes: 5
        run: |
          set -euxo pipefail
          uv run agentalloy start-rerank-server --models recommend-models.json \
            --hardware-target cpu --timeout 120

      - name: Build corpus from scratch (ingest + re-embed all packs)
        timeout-minutes: 130
        run: |
          set -euxo pipefail
          # seed-corpus VERIFIES the in-repo seed corpus is present and valid
          # (preflight only — schema init happens inside install-packs via
          # _ensure_ladybug_schema). Non-fatal: a verification quirk on a
          # fresh runner must not mask the real ingest step below.
          uv run agentalloy seed-corpus || echo "seed-corpus verification non-fatal (fresh runner)"
          # Ingest every pack into LadybugDB and re-embed into DuckDB. This is
          # the real install pipeline; --non-interactive avoids the TTY picker.
          uv run agentalloy install-packs --packs all --non-interactive --no-restart

      - name: Start AgentAlloy service
        timeout-minutes: 5
        run: |
          set -euxo pipefail
          # Settings reads config from the process env, not a cwd .env, so
          # source the user-scoped .env that write-env produced.
          set -a
          # shellcheck disable=SC1091
          . "${XDG_CONFIG_HOME}/agentalloy/.env"
          set +a
          uv run uvicorn agentalloy.app:app --host 127.0.0.1 --port 47950 \
            > service.log 2>&1 &
          # Wait for readiness before probing.
          for i in $(seq 1 60); do
            if curl -fsS "${AGENTALLOY_URL}/health" >/dev/null 2>&1; then
              echo "service healthy after ${i}s"; break
            fi
            if [ "$i" -eq 60 ]; then
              echo "service did not become healthy"; cat service.log; exit 1
            fi
            sleep 2
          done

      - name: Retrieval self-audit
        timeout-minutes: 15
        run: uv run python -m eval.retrieval_audit

      - name: Domain gold-hit probe
        timeout-minutes: 5
        run: uv run python -m eval.gold_hit

      - name: Check corpus regression vs baselines
        timeout-minutes: 2
        run: uv run python eval/check_corpus_regression.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-nightly-runs
          path: |
            eval/runs/*.json
            ${{ env.XDG_DATA_HOME }}/agentalloy/logs/embed-server.log
            ${{ env.XDG_DATA_HOME }}/agentalloy/logs/rerank-server.log
            service.log
          retention-days: 14

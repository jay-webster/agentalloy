name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Test (fast, parallel — excludes integration + container)
        run: uv run pytest -m "not integration and not container"

      - name: Container tests (real podman, serial)
        run: uv run pytest -m "container and not integration" -n0

      - name: Pack version bump guard (pull_request only)
        if: github.event_name == 'pull_request'
        env:
          PACK_GUARD_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: uv run pytest tests/test_pack_version_bump_guard.py::test_pack_version_bump_guard -q

  # Guards the release-time bundle: the container-build release job runs this
  # same tsc + vite build to produce the web-dist.tar.gz asset that
  # `agentalloy pull-web` downloads, so a PR that breaks it must fail here.
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build web UI
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          test -f dist/index.html

  pipx-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel
        run: uv build

      - name: Verify packs bundled in wheel
        run: |
          set -e
          count=$(unzip -l dist/agentalloy-*.whl | grep -c '_packs/' || true)
          echo "pack files in wheel: $count"
          test "$count" -ge 50

      - name: Install wheel into isolated tool env
        run: uv tool install dist/agentalloy-*.whl

      - name: Smoke — entry point resolves
        run: agentalloy --help

      - name: Smoke — wheel-bundled packs discoverable
        run: agentalloy install-packs --list

      - name: Smoke — CLI output shape (no raw-JSON noise)
        # Runs every user-facing verb in an isolated HOME and asserts
        # human-by-default stdout (not a raw JSON dump) + valid --json.
        # Same script the clean-room container runs (container/Containerfile.cleanroom).
        run: bash scripts/cleanroom-smoke.sh

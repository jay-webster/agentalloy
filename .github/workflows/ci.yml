name: CI

on:
  push:
    branches: [main]
  # No branch filter on pull_request: stacked PRs (base = another feature
  # branch) get CI from birth instead of going unverified until retargeted
  # at main during a merge train.
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        # --extra code-index: the vendored engine's tests need tree-sitter +
        # grammars. The pipx-smoke job stays core-only to prove the base
        # wheel works without the extra.
        run: uv sync --frozen --extra code-index

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Test (fast, parallel — excludes integration + container)
        run: uv run pytest -m "not integration and not container"

      - name: Pack version bump guard (pull_request only)
        if: github.event_name == 'pull_request'
        env:
          PACK_GUARD_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: uv run pytest tests/test_pack_version_bump_guard.py::test_pack_version_bump_guard -q

  # Split from `quality` so the image build runs in parallel with lint/type/
  # unit tests and a container flake doesn't force rerunning them. The job
  # always reports a status (required-check friendly); the heavy steps are
  # gated on whether the diff touches anything the container tests exercise,
  # so doc-only PRs skip the image build entirely.
  container-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect container-relevant changes
        id: gate
        # Pushes to main always run (post-merge verification, low frequency).
        # PRs run only when the diff reaches beyond docs/images: code, tests,
        # the image definition, dependency pins, or this workflow.
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE" HEAD \
             | grep -E '^(Containerfile|container/|src/agentalloy/|tests/|scripts/|pyproject\.toml|uv\.lock|\.github/workflows/ci\.yml)' \
             | grep -qvE '\.(md|png|webp|svg)$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No container-relevant changes — container tests skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install uv
        if: steps.gate.outputs.run == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: uv sync --frozen --extra code-index

      - name: Container tests (real podman, serial)
        if: steps.gate.outputs.run == 'true'
        run: uv run pytest -m "container and not integration" -n0

  # Guards the release-time bundle: the container-build release job runs this
  # same tsc + vite build to produce the web-dist.tar.gz asset that
  # `agentalloy pull-web` downloads, so a PR that breaks it must fail here.
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build web UI
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          test -f dist/index.html

  pipx-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel
        run: uv build

      - name: Verify packs bundled in wheel
        run: |
          set -e
          count=$(unzip -l dist/agentalloy-*.whl | grep -c '_packs/' || true)
          echo "pack files in wheel: $count"
          test "$count" -ge 50

      - name: Install wheel into isolated tool env
        run: uv tool install dist/agentalloy-*.whl

      - name: Smoke — entry point resolves
        run: agentalloy --help

      - name: Smoke — code subcommand ships in the core wheel
        # The `code` CLI is HTTP-only (talks to the service) so it must be
        # present and importable without the [code-index] extra.
        run: |
          set -e
          agentalloy --help | grep -qw code
          agentalloy code --help > /dev/null

      - name: Smoke — CODE_INDEX_ENABLED degrades gracefully on the core wheel
        # The core wheel ships no tree-sitter; enabling the module must start
        # the app with modules.code_index == "unavailable", not crash.
        run: |
          CODE_INDEX_ENABLED=1 "$(uv tool dir)/agentalloy/bin/python" - <<'PY'
          from agentalloy.app import create_app

          app = create_app(use_default_lifespan=False)
          status = app.state.module_status
          print(f"module_status: {status}")
          assert status["code_index"] == "unavailable", status
          PY

      - name: Smoke — wheel-bundled packs discoverable
        run: agentalloy install-packs --list

      - name: Smoke — CLI output shape (no raw-JSON noise)
        # Runs every user-facing verb in an isolated HOME and asserts
        # human-by-default stdout (not a raw JSON dump) + valid --json.
        # Same script the clean-room container runs (container/Containerfile.cleanroom).
        run: bash scripts/cleanroom-smoke.sh

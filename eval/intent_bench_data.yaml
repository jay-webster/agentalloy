# Labeled intent-classifier benchmark for AgentAlloy's signal layer.
#
# Three transition intents the signal layer cares about:
#   completion  — user signals the current artifact/step is done; ready to advance.
#   approval    — user is approving recent work/output (transition-grade approval).
#   redirection — user wants to change direction / abandon the current approach.
#   none        — ordinary task prompts, questions, bug reports; no transition signal.
#
# Fields per item:
#   text        — the user utterance (paraphrases a real user would type; typos kept).
#   label       — gold: completion | approval | redirection | none
#   difficulty  — clear | paraphrase | negation | scoped
#
# Positives are deliberately NOT copied from classifier._INTENT_REFERENCES.
# Hard negatives: negations (label flips to none) and scoped praise (praise that
# is NOT a transition-grade approval — label none).


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 740" width="860" height="740" role="img" aria-label="Two panels. Panel one: for an 8B, 12B, and 35B model, three bars each — bare model, with AgentAlloy, and the flat oracle (all gold skills pasted). AgentAlloy lifts every model over bare, most on the 8B (0.663 to 0.814); on the 35B it reaches the oracle (0.994 vs 0.992). Panel two: for all three models, AgentAlloy injects ~60% fewer tokens than pasting the full gold skills (around 800 tokens vs around 2,000). The 8B keeps 92% of the paste-everything score, the 12B 98%, and the 35B 100% — the same ~60% context cut every time, with near-oracle quality."><rect x="0" y="0" width="860" height="740" fill="#1a1a19"/>
